                              value={mockTestSize}
                              onChange={(e) => setMockTestSize(Number(e.target.value))}
                              className="w-full font-medium bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-2xl p-4 text-slate-800 dark:text-slate-100 outline-none cursor-pointer focus:border-blue-500 transition-colors shadow-sm appearance-none"
                            >
                              <option value={10}>10 Questions</option>
                              <option value={15}>15 Questions</option>
                              <option value={20}>20 Questions</option>
                              <option value={24}>24 Questions (Official Standard)</option>
                              <option value={40}>40 Questions</option>
                              <option value={50}>50 Questions</option>
                            </select>
                          </div>

                          {/* Question Database Status Indicators */}
                          <div className="space-y-3">
                             <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                              <div className="p-2 bg-slate-200 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-full">
                                <Info size={18} />
                              </div>
                              Database Status
                            </label>
                            <div className="p-5 rounded-3xl bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 shadow-sm space-y-4">
                              <div className="flex items-center justify-between">
                                <span className="text-sm font-bold text-slate-700 dark:text-slate-300">Database Size</span>
                                <span className="text-xs font-bold px-3 py-1 bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-200 rounded-full">{questions.length} Questions</span>
                              </div>
                              <div className="flex items-center justify-between">
                                <span className="text-sm font-bold text-slate-700 dark:text-slate-300">Active Source</span>
                                <span className={`text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-full border ${activeBankMode === 'exam' ? 'bg-purple-100 border-purple-300 text-purple-800 dark:bg-purple-900/30 dark:border-purple-800 dark:text-purple-300' : (usingExternal ? 'bg-green-100 border-green-300 text-green-800 dark:bg-green-900/30 dark:border-green-800 dark:text-green-300' : 'bg-orange-100 border-orange-300 text-orange-800 dark:bg-orange-900/30 dark:border-orange-800 dark:text-orange-300')}`}>
                                  {activeBankMode === 'exam' ? 'exam_questions.js' : (usingExternal ? 'questions_bank.js' : 'Default Samples')}
                                </span>
                              </div>
                              
                              {hasExamBank && activeBankMode === 'standard' && (
                                <p className="text-[12px] leading-relaxed text-purple-700 dark:text-purple-400 mt-2 font-bold p-3 bg-purple-50 dark:bg-purple-900/10 rounded-xl border border-purple-200 dark:border-purple-900/30">
                                  🏆 Past Exam Papers unlocked! Switch modes on the Home screen to practice real exams.
                                </p>
                              )}
                              
                              {!usingExternal && activeBankMode === 'standard' && (
                                <p className="text-[11px] leading-relaxed text-slate-600 dark:text-slate-400 mt-2">
                                  To load your entire custom question database, simply upload a <code>questions_bank.js</code> file in the same directory.
                                </p>
                              )}
                            </div>
                          </div>
                      </div>

                      {/* Column 2 */}
                      <div className="space-y-8">
                          {/* Auto-next Toggle */}
                          <div className="space-y-3">
                            <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                              <div className="p-2 bg-green-100 dark:bg-green-900/50 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 rounded-full">
                                <Play size={18} className="ml-0.5" />
                              </div>
                              Auto-Advance
                            </label>
                            <div className="flex items-center justify-between p-5 bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-3xl cursor-pointer shadow-sm" onClick={() => setAutoNavigate(!autoNavigate)}>
                              <div>
                                <span className="text-sm font-bold text-slate-900 dark:text-slate-100 block">Advance on correct</span>
                                <span className="text-xs text-slate-600 dark:text-slate-400 mt-0.5 block">Jump to next automatically</span>
                              </div>
                              <input
                                type="checkbox"
                                checked={autoNavigate}
                                readOnly
                                className="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 pointer-events-none accent-blue-600"
                              />
                            </div>
                          </div>

                          {/* Delay Speed Select */}
                          {autoNavigate && (
                            <div className="space-y-3 animate-in fade-in slide-in-from-top-2 duration-300">
                              <label className="text-sm font-bold text-slate-800 dark:text-slate-300">Delay Time</label>
                              <select
                                value={autoNavDelay}
                                onChange={(e) => setAutoNavDelay(Number(e.target.value))}
                                className="w-full font-medium bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-2xl p-4 text-slate-800 dark:text-slate-100 outline-none cursor-pointer focus:border-blue-500 transition-colors shadow-sm appearance-none"
                              >
                                <option value={1}>1 Second</option>
                                <option value={2}>2 Seconds</option>
                                <option value={3}>3 Seconds</option>
                                <option value={5}>5 Seconds</option>
                              </select>
                            </div>
                          )}

                          {/* Study Mode Settings */}
                          <div className="space-y-3 pt-2">
                            <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                              <div className="p-2 bg-emerald-100 dark:bg-emerald-900/50 border border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 rounded-full">
                                <GraduationCap size={18} />
                              </div>
                              Study Mode
                            </label>
                            <div className="flex items-center justify-between p-5 bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 rounded-3xl cursor-pointer shadow-sm" onClick={() => setHideIncorrectStudy(!hideIncorrectStudy)}>
                              <div>
                                <span className="text-sm font-bold text-slate-900 dark:text-slate-100 block">Hide wrong answers</span>
                                <span className="text-xs text-slate-600 dark:text-slate-400 mt-0.5 block">Show only the correct option</span>
                              </div>
                              <input
                                type="checkbox"
                                checked={hideIncorrectStudy}
                                readOnly
                                className="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 pointer-events-none accent-blue-600"
                              />
                            </div>
                          </div>

                          {/* Appearance Settings */}
                          <div className="space-y-3 pt-2">
                            <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                              <div className="p-2 bg-indigo-100 dark:bg-indigo-900/50 border border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-400 rounded-full">
                                <Monitor size={18} />
                              </div>
                              Appearance
                            </label>
                            <div className="flex bg-slate-200 dark:bg-slate-900 rounded-2xl p-1.5 border border-slate-300 dark:border-slate-700 shadow-inner">
                              {['system', 'light', 'dark'].map((t) => (
                                <button
                                  key={t}
                                  onClick={() => setThemePreference(t)}
                                  className={`flex-1 flex items-center justify-center gap-2 py-2.5 text-sm font-bold rounded-xl transition-all ${themePreference === t ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-700 dark:text-blue-400 border border-slate-300 dark:border-slate-600' : 'text-slate-600 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 border border-transparent'}`}
                                >
                                  {t === 'light' && <Sun size={16} />}
                                  {t === 'dark' && <Moon size={16} />}
                                  {t === 'system' && <Monitor size={16} />}
                                  <span className="capitalize hidden sm:inline">{t}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                      </div>
                  </div>

                  <hr className="border-slate-200 dark:border-slate-700" />

                  {/* Reset History / Local Storage */}
                  <div>
                      <button
                        onClick={() => {
                          if (window.confirm("Are you sure you want to clear your stats, failed questions memory, and exam history? This cannot be undone.")) {
                            localStorage.clear();
                            window.location.reload();
                          }
                        }}
                        className="w-full bg-white dark:bg-slate-900 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 dark:text-red-400 border-2 border-red-200 dark:border-red-900 font-bold py-4 rounded-full transition-all text-base flex items-center justify-center gap-2 shadow-sm"
                      >
                        <RefreshCcw size={18} />
                        Reset Progress & Stats
                      </button>
                  </div>
                </div>
              </div>
            );
          };

          // Render Loading Indicator while Scanning for external JS file
          if (loadingQuestions) {
            return (
              <div className="min-h-screen bg-slate-100 dark:bg-[#0f172a] flex flex-col items-center justify-center p-4 transition-colors duration-300">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 dark:border-blue-400 mb-4"></div>
                <p className="text-slate-700 dark:text-slate-300 font-bold text-lg">Scanning for questions_bank.js...</p>
                <p className="text-xs text-slate-500 dark:text-slate-500 mt-2 font-medium">Falling back to default sample bank if not found</p>
              </div>
            );
          }

          return (
            <div className={`${isDarkMode ? 'dark' : ''}`}>
              <div className="min-h-screen bg-slate-100 dark:bg-[#0f172a] font-sans text-slate-900 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">
                <header className="bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur-md sticky top-0 z-50 border-b border-slate-300 dark:border-slate-800 shadow-sm">
                  <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-blue-700 dark:text-blue-400 font-bold text-xl cursor-pointer tracking-tight" onClick={() => setCurrentScreen('home')}>
                      <BookOpen size={26} strokeWidth={2.5} />
                      <span className="hidden sm:inline">UK Life Prep</span>
                    </div>
                    
                    <div className="flex items-center gap-1 sm:gap-2">
                      <button 
                        onClick={() => {
                          if (themePreference === 'system') setThemePreference('light');
                          else if (themePreference === 'light') setThemePreference('dark');
                          else setThemePreference('system');
                        }}
                        className="hidden md:flex items-center justify-center p-2 rounded-full text-slate-600 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors mr-2"
                        title={`Theme: ${themePreference.charAt(0).toUpperCase() + themePreference.slice(1)}`}
                      >
                        {themePreference === 'light' && <Sun size={20} />}
                        {themePreference === 'dark' && <Moon size={20} />}
                        {themePreference === 'system' && <Monitor size={20} />}
                      </button>

                      <button 
                        onClick={() => setCurrentScreen('home')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all ${currentScreen === 'home' ? 'bg-blue-100 border border-blue-200 text-blue-800 dark:bg-blue-900/40 dark:border-blue-800 dark:text-blue-200' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 border border-transparent'}`}
                      >
                        <Home size={18} />
                        <span className="hidden sm:inline">Home</span>
                      </button>
                      
                      <button 
                        onClick={() => setCurrentScreen('analysis')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all ${currentScreen === 'analysis' ? 'bg-blue-100 border border-blue-200 text-blue-800 dark:bg-blue-900/40 dark:border-blue-800 dark:text-blue-200' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 border border-transparent'}`}
                      >
                        <BarChart3 size={18} />
                        <span className="hidden sm:inline">Stats</span>
                      </button>

                      <button 
                        onClick={() => setCurrentScreen('settings')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all ${currentScreen === 'settings' ? 'bg-blue-100 border border-blue-200 text-blue-800 dark:bg-blue-900/40 dark:border-blue-800 dark:text-blue-200' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 border border-transparent'}`}
                      >
                        <Settings size={18} />
                        <span className="hidden sm:inline">Settings</span>
                      </button>

                      {(currentScreen === 'quiz' || currentScreen === 'study') && (
                        <div className="h-6 w-px bg-slate-300 dark:bg-slate-700 mx-2 hidden sm:block"></div>
                      )}
                      {(currentScreen === 'quiz' || currentScreen === 'study') && (
                        <button 
                          onClick={() => setCurrentScreen('home')}
                          className="flex items-center justify-center p-2 rounded-full text-red-600 hover:bg-red-100 dark:text-red-500 dark:hover:bg-red-900/30 transition-colors"
                          title="Quit Session"
                        >
                          <XCircle size={22} />
                        </button>
                      )}
                    </div>
                  </div>
                </header>

                {/* GLOBAL BANK TOGGLE SUB-HEADER (Sticky) */}
                {hasExamBank && !['quiz', 'study', 'results'].includes(currentScreen) && (
                  <div className="bg-slate-100/95 dark:bg-[#0f172a]/95 backdrop-blur-md sticky top-16 z-40 border-b border-slate-300 dark:border-slate-800 px-4 py-3 shadow-sm flex justify-center animate-in slide-in-from-top-2 duration-300">
                    <div className="flex bg-slate-200 dark:bg-slate-900 p-1.5 rounded-2xl border border-slate-300 dark:border-slate-700 shadow-inner w-full max-w-sm">
                      <button 
                        onClick={() => setActiveBankMode('standard')}
                        className={`flex-1 flex items-center justify-center gap-2 py-2 px-2 rounded-xl text-sm sm:text-base font-bold transition-all ${activeBankMode === 'standard' ? 'bg-white dark:bg-slate-700 text-blue-700 dark:text-blue-400 shadow-sm border border-slate-300 dark:border-slate-600' : 'text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}
                      >
                        <BookOpen size={18} className="shrink-0" />
                        <span className="hidden sm:inline">Standard Syllabus</span>
                        <span className="sm:hidden">Syllabus</span>
                      </button>
                      <button 
                        onClick={() => setActiveBankMode('exam')}
                        className={`flex-1 flex items-center justify-center gap-2 py-2 px-2 rounded-xl text-sm sm:text-base font-bold transition-all ${activeBankMode === 'exam' ? 'bg-white dark:bg-slate-700 text-purple-700 dark:text-purple-400 shadow-sm border border-slate-300 dark:border-slate-600' : 'text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}
                      >
                        <Trophy size={18} className="shrink-0" />
                        <span className="hidden sm:inline">Past Exams</span>
                        <span className="sm:hidden">Exams</span>
                      </button>
                    </div>
                  </div>
                )}

                <main className="pb-10 pt-4">
                  {currentScreen === 'home' && renderHome()}
                  {currentScreen === 'quiz' && renderQuiz()}
                  {currentScreen === 'study' && renderStudy()}
                  {currentScreen === 'results' && renderResults()}
                  {currentScreen === 'analysis' && renderAnalysis()}
                  {currentScreen === 'settings' && renderSettings()}
                </main>

                {/* STUDY MODE RESUME CHOICE MODAL */}
                {isStudyResumeModalOpen && (
                  <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="w-full max-w-sm bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-200 dark:border-slate-700 animate-in zoom-in-95 duration-300 text-center">
                      <div className="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-5">
                        <GraduationCap size={32} />
                      </div>
                      <h3 className="text-2xl font-bold text-slate-900 dark:text-slate-50 mb-2">Resume Session</h3>
                      <p className="text-slate-600 dark:text-slate-400 mb-8 text-sm">
                        You have an active study session. Resume from your last position or start fresh?
                      </p>

                      <div className="flex flex-col gap-3">
                        <button
                          onClick={() => {
                            setIsStudyResumeModalOpen(false);
                            setCurrentScreen('study');
                          }}
                          className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3.5 rounded-full transition-all shadow-md"
                        >
                          Resume from Q{studyIndex + 1}
                        </button>
                        <button
                          onClick={() => {
                            setIsStudyResumeModalOpen(false);
                            setStudyIndex(0);
                            setCurrentScreen('study');
                          }}
                          className="w-full bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-800 dark:text-slate-200 font-medium py-3.5 rounded-full transition-all"
                        >
                          Restart from Beginning
                        </button>
                        <button
                          onClick={() => setIsStudyResumeModalOpen(false)}
                          className="w-full text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800/50 py-3.5 rounded-full font-bold transition-all text-sm mt-2"
                        >
                          Cancel
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA Setup: Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
