                      {(currentScreen === 'quiz' || currentScreen === 'study') && (
                        <div className="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-1 hidden sm:block"></div>
                      )}
                      {(currentScreen === 'quiz' || currentScreen === 'study') && (
                        <button 
                          onClick={() => setCurrentScreen('home')}
                          className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors"
                        >
                          <XCircle size={18} />
                          <span className="hidden lg:inline">Quit</span>
                        </button>
                      )}
                    </div>
                  </div>
                </header>

                <main className="pb-8 pt-4">
                  {currentScreen === 'home' && renderHome()}
                  {currentScreen === 'quiz' && renderQuiz()}
                  {currentScreen === 'study' && renderStudy()}
                  {currentScreen === 'results' && renderResults()}
                  {currentScreen === 'analysis' && renderAnalysis()}
                  {currentScreen === 'settings' && renderSettings()}
                </main>

                {/* STUDY MODE RESUME CHOICE MODAL */}
                {isStudyResumeModalOpen && (
                  <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
                    <div className="w-full max-w-md bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-700 p-6 sm:p-8 animate-in zoom-in-95 duration-300 text-center">
                      <div className="w-16 h-16 bg-emerald-100 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4">
                        <GraduationCap size={32} />
                      </div>
                      <h3 className="text-2xl font-black text-slate-800 dark:text-slate-50 mb-2">Saved Study Session</h3>
                      <p className="text-slate-600 dark:text-slate-400 mb-6 text-sm">
                        You have an active study session. Would you like to resume from your last position or start fresh from the first question?
                      </p>

                      <div className="flex flex-col gap-3">
                        <button
                          onClick={() => {
                            setIsStudyResumeModalOpen(false);
                            setCurrentScreen('study');
                          }}
                          className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2"
                        >
                          Resume from Q{studyIndex + 1}
                        </button>
                        <button
                          onClick={() => {
                            setIsStudyResumeModalOpen(false);
                            setStudyIndex(0);
                            setCurrentScreen('study');
                          }}
                          className="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-800 dark:text-slate-250 font-bold py-3 rounded-xl transition-all"
                        >
                          Restart from Beginning
                        </button>
                        <button
                          onClick={() => setIsStudyResumeModalOpen(false)}
                          className="w-full border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-450 hover:bg-slate-50 dark:hover:bg-slate-700/50 py-3 rounded-xl font-bold transition-all text-sm"
                        >
                          Cancel
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA Setup: Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
