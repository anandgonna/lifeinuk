<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in the UK: PWA Mock Test App</title>
    
    <!-- Load Open Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- PWA Setup: Manifest and Theme Color -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b" />
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzI1NjNlYiIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZT0iIzI1NjNlYiIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTIgM2g2YTQgNCAwIDAgMSA0IDR2MTRhMyAzIDAgMCAwLTMtM0gyeiIvPjxwYXRoIGQ9Ik0yMiAzaC02YTQgNCAwIDAgMC00IDR2MTRhMyAzIDAgMCAxIDMtM2g3eiIvPjwvc3ZnPg==" />

    <!-- Load Babel to compile React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for React and Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
</head>
<body class="antialiased bg-slate-50 font-sans transition-colors duration-300">
    <div id="root"></div>

    <!-- Your React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          BookOpen, Trophy, AlertTriangle, CheckCircle2, XCircle, 
          RefreshCcw, ArrowRight, Play, Home, BarChart3, Info, Brain, Moon, Sun, Target, X,
          Clock, PieChart, Activity, ChevronLeft, ChevronRight, GraduationCap, Settings
        } from 'lucide-react';

        /* DEFAULT 10 SAMPLE QUESTIONS DATABANK FOR LOCAL FALLBACK WITH MEMORY TIPS */
        const defaultRawData = [
          [1, "History", "Which two languages were used across England during the Middle Ages?", ["Welsh and Gaelic", "Norman French and Anglo-Saxon", "Latin and Celtic", "Nordic and English"], 1, "The king and noblemen spoke Norman French; peasants spoke Anglo-Saxon.", "French for the fancy folks at court, Saxon for the struggling peasants!"],
          [2, "History", "In 1776, which British colonies declared their independence?", ["North African", "Asian", "North American", "South African"], 2, "13 North American colonies declared independence over 'no taxation without representation'.", "America said: 'No tea tax, we want our own map!' in 1776."],
          [3, "History", "When was England ruled by a republic and not by a monarch?", ["When Elizabeth I died", "When Charles I was executed", "When the Magna Carta was signed", "After the Battle of Hastings"], 1, "After Charles I was executed in 1649, England became a republic called the Commonwealth.", "Oliver Cromwell put a 'well' over the Crown (republic) after Charles lost his head in 1649."],
          [4, "Culture & Society", "Which of the following is one of the highest-grossing film franchises produced in the UK?", ["Harry Potter", "Spider-man", "The Lord of the Rings", "Indiana Jones"], 0, "Harry Potter and James Bond are two of the highest-grossing UK film franchises.", "Potter and Bond are the ultimate UK cash goldmines."],
          [5, "History", "When did the first farmers come to Britain?", ["10,000 years ago", "6,000 years ago", "15,000 years ago", "2,000 years ago"], 1, "The first farmers arrived in Britain about 6,000 years ago from south-east Europe.", "Farming has 6 letters -> 6,000 years ago!"],
          [6, "History", "When did the First World War end?", ["12.00 pm 11th Nov 1914", "12.00 pm 11th Nov 1918", "11.00 am 11th Nov 1914", "11.00 am 11th Nov 1918"], 3, "WWI ended at 11.00 am on 11th November 1918.", "The 11th hour of the 11th day of the 11th month in 1918. All the 11s!"],
          [7, "Laws & Gov", "Can court orders be obtained to protect a person from being forced into a marriage?", ["Yes", "No"], 0, "True. Forced Marriage Protection Orders protect people from being forced into a marriage.", "The law always says YES to protecting your choice of who you marry."],
          [8, "Sports & Leisure", "What medal did Mary Peters win in the 1972 Olympics?", ["No medals", "Silver", "Gold", "Bronze"], 2, "She won an Olympic gold medal in the pentathlon in 1972.", "Mary Peters won pure gold in her running gears."],
          [9, "Laws & Gov", "In England, Wales and NI, Youth Court cases are normally heard by (choose two):", ["Up to 3 specially trained magistrates AND a District Judge", "A sheriff AND a jury", "Members of the public", "High Court Judges"], 0, "Cases are heard by up to 3 specially trained magistrates or a District Judge. Public are not allowed.", "Three key people keep youth cases quiet and private."],
          [10, "People", "What was invented by Alan Turing in the 1930s?", ["The jet engine", "The television", "The Turing machine", "The ball pen"], 2, "A Turing machine is a theoretical mathematical device that influenced modern computers.", "Turing invented the Turing machine — his name is right in the answer!"]
        ];

        const DEFAULT_QUESTION_BANK = defaultRawData.map(d => ({
          id: d[0],
          category: d[1],
          text: d[2],
          options: d[3],
          correctAnswer: d[3][d[4]],
          explanation: d[5],
          tip: d[6] || ""
        }));

        const APP_VERSION = "v1.6";

        function App() {
          const [currentScreen, setCurrentScreen] = useState('home'); // home, quiz, results, analysis, study, settings
          const [activeQuestions, setActiveQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [userAnswers, setUserAnswers] = useState({});
          const [showExplanation, setShowExplanation] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          // Test Timer States
          const [elapsedTime, setElapsedTime] = useState(0);
          const [finalTestTime, setFinalTestTime] = useState(0);

          // Study Resume Prompt Modal state
          const [isStudyResumeModalOpen, setIsStudyResumeModalOpen] = useState(false);

          // Dynamic Question Bank States
          const [questions, setQuestions] = useState([]);
          const [loadingQuestions, setLoadingQuestions] = useState(true);
          const [usingExternal, setUsingExternal] = useState(false);

          // Study & Review Mode State
          const [studyIndex, setStudyIndex] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeStudyIndex');
              return saved ? parseInt(saved, 10) : 0;
            } catch(e) { return 0; }
          });
          const [studyOptions, setStudyOptions] = useState([]);

          // Auto-navigate states
          const [autoNavProgress, setAutoNavProgress] = useState(0);
          const [isAutoNavCancelled, setIsAutoNavCancelled] = useState(false);

          // Persistent Local Storage State
          const [autoNavigate, setAutoNavigate] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeAutoNav');
              return saved !== null ? JSON.parse(saved) : true;
            } catch(e) { return true; }
          });

          const [autoNavDelay, setAutoNavDelay] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeAutoNavDelay');
              return saved ? parseInt(saved, 10) : 3;
            } catch(e) { return 3; }
          });

          const [mockTestSize, setMockTestSize] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeMockTestSize');
              return saved ? parseInt(saved, 10) : 24;
            } catch(e) { return 24; }
          });

          const [quizHistory, setQuizHistory] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeQuizHistory');
              return saved ? JSON.parse(saved) : [];
            } catch(e) { return []; }
          }); 
          
          const [questionHistory, setQuestionHistory] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeQuestionHistory');
              return saved ? JSON.parse(saved) : {};
            } catch(e) { return {}; }
          });

          const [recentlySeen, setRecentlySeen] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeRecentlySeen');
              return saved ? new Set(JSON.parse(saved)) : new Set();
            } catch(e) { return new Set(); }
          });

          // Dynamic detection of external questions file
          useEffect(() => {
            let hasResolved = false;

            const handleFallback = () => {
              if (hasResolved) return;
              hasResolved = true;
              setQuestions(DEFAULT_QUESTION_BANK);
              setUsingExternal(false);
              setLoadingQuestions(false);
            };

            const handleSuccess = (externalData) => {
              if (hasResolved) return;
              hasResolved = true;
              const mapped = externalData.map(d => ({
                id: d[0],
                category: d[1],
                text: d[2],
                options: d[3],
                correctAnswer: d[3][d[4]],
                explanation: d[5],
                tip: d[6] || ""
              }));
              setQuestions(mapped);
              setUsingExternal(true);
              setLoadingQuestions(false);
            };

            // Check if dynamically preloaded statically
            if (window.EXTERNAL_QUESTIONS && Array.isArray(window.EXTERNAL_QUESTIONS) && window.EXTERNAL_QUESTIONS.length > 0) {
              handleSuccess(window.EXTERNAL_QUESTIONS);
              return;
            }

            // Create dynamic script node to avoid local CORS issues
            const script = document.createElement('script');
            script.src = 'questions_bank.js';
            script.async = true;
            
            script.onload = () => {
              if (window.EXTERNAL_QUESTIONS && Array.isArray(window.EXTERNAL_QUESTIONS) && window.EXTERNAL_QUESTIONS.length > 0) {
                handleSuccess(window.EXTERNAL_QUESTIONS);
              } else {
                handleFallback();
              }
            };

            script.onerror = () => {
              handleFallback();
            };

            document.body.appendChild(script);

            // Timeout safety guard (1.2s max scan time)
            const timer = setTimeout(() => {
              handleFallback();
            }, 1200);

            return () => {
              clearTimeout(timer);
              if (script.parentNode) {
                script.parentNode.removeChild(script);
              }
            };
          }, []);

          // Helper to get score values safely for backwards compatibility
          const getScoreValue = (entry) => typeof entry === 'number' ? entry : entry.score;
          const getTotalValue = (entry) => typeof entry === 'number' ? 24 : entry.total;

          useEffect(() => {
            localStorage.setItem('ukLifeAutoNav', JSON.stringify(autoNavigate));
          }, [autoNavigate]);

          useEffect(() => {
            localStorage.setItem('ukLifeAutoNavDelay', autoNavDelay);
          }, [autoNavDelay]);

          useEffect(() => {
            localStorage.setItem('ukLifeMockTestSize', mockTestSize);
          }, [mockTestSize]);

          useEffect(() => {
            localStorage.setItem('ukLifeQuizHistory', JSON.stringify(quizHistory));
          }, [quizHistory]);

          useEffect(() => {
            localStorage.setItem('ukLifeQuestionHistory', JSON.stringify(questionHistory));
          }, [questionHistory]);

          useEffect(() => {
            localStorage.setItem('ukLifeRecentlySeen', JSON.stringify([...recentlySeen]));
          }, [recentlySeen]);

          useEffect(() => {
            localStorage.setItem('ukLifeStudyIndex', studyIndex.toString());
          }, [studyIndex]);

          // Shuffler for Study & Review Mode Options
          useEffect(() => {
            if (currentScreen === 'study' && questions[studyIndex]) {
              setStudyOptions([...questions[studyIndex].options].sort(() => Math.random() - 0.5));
            }
          }, [studyIndex, currentScreen, questions]);

          // Auto theme detection
          useEffect(() => {
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            setIsDarkMode(mediaQuery.matches);
            const handler = (e) => setIsDarkMode(e.matches);
            mediaQuery.addEventListener('change', handler);
            return () => mediaQuery.removeEventListener('change', handler);
          }, []);

          // Live Test Timer Increment effect
          useEffect(() => {
            let timer;
            if (currentScreen === 'quiz') {
              timer = setInterval(() => {
                setElapsedTime(prev => prev + 1);
              }, 1000);
            } else {
              clearInterval(timer);
            }
            return () => clearInterval(timer);
          }, [currentScreen]);

          // Enhanced Auto-advance effect with visual progress timer
          useEffect(() => {
            let interval;
            const duration = autoNavDelay * 1000; 
            const updateInterval = 30; 

            if (currentScreen === 'quiz' && showExplanation && autoNavigate && !isAutoNavCancelled) {
              const isCorrect = userAnswers[currentIndex] === activeQuestions[currentIndex]?.correctAnswer;
              if (isCorrect) {
                let elapsed = 0;
                interval = setInterval(() => {
                  elapsed += updateInterval;
                  setAutoNavProgress((elapsed / duration) * 100);
                  if (elapsed >= duration) {
                    clearInterval(interval);
                    nextQuestion();
                  }
                }, updateInterval);
              }
            }
            return () => clearInterval(interval);
          }, [showExplanation, currentIndex, autoNavigate, autoNavDelay, currentScreen, isAutoNavCancelled, userAnswers, activeQuestions]);

          // Format seconds into MM:SS
          const formatTime = (secs) => {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          // Format seconds into readable English (e.g. 1m 45s)
          const formatTimeReadable = (secs) => {
            if (!secs) return "0s";
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            if (m === 0) return `${s}s`;
            return `${m}m ${s}s`;
          };

          // Generates a mock test with support for standard (configurable size), weak-targeted, or marathon mode (all Qs)
          const generateQuiz = (focusWeak = false, marathonMode = false) => {
            let pool = [];
            let updatedSeen = new Set(recentlySeen);
            const targetSize = marathonMode ? questions.length : Math.min(mockTestSize, questions.length);

            if (marathonMode) {
              pool = [...questions].sort(() => 0.5 - Math.random());
            } else if (focusWeak) {
              const weakQuestions = questions.filter(q => {
                const stats = questionHistory[q.id];
                return stats && (stats.attempts > stats.correct) && (stats.correct < 3);
              });

              const shuffledWeak = [...weakQuestions].sort(() => 0.5 - Math.random());
              pool = shuffledWeak.slice(0, targetSize);

              if (pool.length < targetSize) {
                let available = questions.filter(q => !pool.includes(q) && !updatedSeen.has(q.id));
                if (available.length < (targetSize - pool.length)) {
                    updatedSeen.clear();
                    available = questions.filter(q => !pool.includes(q));
                }
                const shuffledOther = [...available].sort(() => 0.5 - Math.random());
                pool = [...pool, ...shuffledOther.slice(0, targetSize - pool.length)];
              }
            } else {
              const weakQuestions = questions.filter(q => {
                const stats = questionHistory[q.id];
                return stats && (stats.attempts > stats.correct) && (stats.correct < 3);
              });
              const shuffledWeak = [...weakQuestions].sort(() => 0.5 - Math.random());
              const selectedWeak = shuffledWeak.slice(0, Math.min(5, weakQuestions.length)); 

              let available = questions.filter(q => !selectedWeak.includes(q) && !updatedSeen.has(q.id));
              if (available.length < (targetSize - selectedWeak.length)) {
                  updatedSeen.clear();
                  available = questions.filter(q => !selectedWeak.includes(q));
              }
              const shuffledOther = [...available].sort(() => 0.5 - Math.random());
              const selectedOther = shuffledOther.slice(0, targetSize - selectedWeak.length);

              pool = [...selectedWeak, ...selectedOther].sort(() => 0.5 - Math.random());
            }

            if (!marathonMode) {
              pool.forEach(q => updatedSeen.add(q.id));
              setRecentlySeen(updatedSeen);
            }

            // Shuffle the options of each selected question in the pool
            const shuffledPool = pool.map(q => {
              const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
              return {
                ...q,
                options: shuffledOptions
              };
            });

            setActiveQuestions(shuffledPool);
            setCurrentIndex(0);
            setUserAnswers({}); 
            setShowExplanation(false);
            setIsAutoNavCancelled(false);
            setAutoNavProgress(0);
            setElapsedTime(0); // Reset timer
            setCurrentScreen('quiz');
          };

          const handleStudyModeClick = () => {
            if (studyIndex > 0) {
              setIsStudyResumeModalOpen(true);
            } else {
              setStudyIndex(0);
              setCurrentScreen('study');
            }
          };

          const handleAnswer = (answer) => {
            if (showExplanation) return; 
            const isCorrect = answer === activeQuestions[currentIndex].correctAnswer;
            const qId = activeQuestions[currentIndex].id;

            setUserAnswers(prev => ({
              ...prev,
              [currentIndex]: answer
            }));
            
            setIsAutoNavCancelled(false);
            setAutoNavProgress(0);
            setShowExplanation(true);

            // Reactive Update: Questions coverage registers instantly inside the DB tracker
            setQuestionHistory(prev => ({
                ...prev,
                [qId]: {
                    attempts: (prev[qId]?.attempts || 0) + 1,
                    correct: (prev[qId]?.correct || 0) + (isCorrect ? 1 : 0)
                }
            }));
          };

          const nextQuestion = () => {
            if (currentIndex < activeQuestions.length - 1) {
              setCurrentIndex(currentIndex + 1);
              setShowExplanation(false);
              setIsAutoNavCancelled(false);
              setAutoNavProgress(0);
            } else {
              finishQuiz();
            }
          };

          const finishQuiz = () => {
            const score = calculateScore();
            const total = activeQuestions.length;
            
            setFinalTestTime(elapsedTime);

            const newEntry = {
              score,
              total,
              timeTaken: elapsedTime,
              date: new Date().toLocaleDateString()
            };
            
            const newHistory = [...quizHistory, newEntry];
            setQuizHistory(newHistory);
            setCurrentScreen('results');
          };

          const calculateScore = () => {
            let correct = 0;
            activeQuestions.forEach((q, index) => {
              if (userAnswers[index] === q.correctAnswer) {
                correct++;
              }
            });
            return correct;
          };

          const getCategoryStats = () => {
            const stats = {};
            questions.forEach(q => {
              if (!stats[q.category]) {
                stats[q.category] = { total: 0, correct: 0, incorrect: 0, unseen: 0 };
              }
              
              stats[q.category].total += 1;
              
              const history = questionHistory[q.id];
              if (!history) {
                stats[q.category].unseen += 1;
              } else {
                // Uses the same logic as your weak areas: 
                // It's considered "incorrect/weak" until you answer it correctly enough times to master it.
                const isWeak = history.attempts > history.correct && history.correct < 3;
                if (isWeak) {
                  stats[q.category].incorrect += 1;
                } else {
                  stats[q.category].correct += 1;
                }
              }
            });
            return stats;
          };

          const getWeakQuestionsCount = () => {
             return Object.values(questionHistory).filter(stats => (stats.attempts > stats.correct) && (stats.correct < 3)).length;
          };

          const renderHome = () => {
            const uniqueQuestionsSeen = Object.keys(questionHistory).length;
            const coveragePercent = questions.length > 0 ? Math.round((uniqueQuestionsSeen / questions.length) * 100) : 0;
            
            let totalSeenAttempts = 0;
            let totalSeenCorrect = 0;
            Object.values(questionHistory).forEach(stats => {
                totalSeenAttempts += stats.attempts;
                totalSeenCorrect += stats.correct;
            });
            const overallAccuracy = totalSeenAttempts > 0 ? (totalSeenCorrect / totalSeenAttempts) * 100 : 0;
            const preparednessScore = Math.min(100, Math.round((coveragePercent / 100) * overallAccuracy)) || 0;

            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                {/* Hero Section */}
                <div className="bg-white dark:bg-slate-800 p-6 sm:p-10 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 mb-8 flex flex-col sm:flex-row items-center sm:items-start gap-6 sm:gap-8 text-center sm:text-left transition-all">
                  <div className="w-20 h-20 sm:w-24 sm:h-24 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center shrink-0 shadow-inner">
                    <BookOpen size={40} className="sm:w-12 sm:h-12" />
                  </div>
                  <div className="flex-1">
                    <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-800 dark:text-slate-50 mb-3 tracking-tight">Life in the UK: Exam Prep</h1>
                    <div className="flex items-center justify-center sm:justify-start gap-2 mb-4">
                        <Brain size={18} className="text-indigo-500 dark:text-indigo-400" />
                        <span className="text-xs sm:text-sm font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Master dynamic training system</span>
                    </div>
                    <p className="text-slate-600 dark:text-slate-300 text-base sm:text-lg leading-relaxed max-w-2xl">
                      Master the official syllabus details with smart spacing, persistent weak-area tracking, and customizable auto-navigation.
                    </p>
                  </div>
                </div>

                <h2 className="text-xl font-extrabold text-slate-800 dark:text-slate-50 mb-6 flex items-center gap-2">
                  <Activity size={20} className="text-blue-500" />
                  Training Modes
                </h2>

                {/* Actions Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  {activeQuestions.length > 0 && currentIndex < activeQuestions.length && currentScreen !== 'results' && (
                    <button 
                      onClick={() => setCurrentScreen('quiz')}
                      className="lg:col-span-4 bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-orange-500/30 hover:scale-[1.02] active:scale-95 text-base"
                    >
                      <Play size={20} />
                      Resume Interrupted Test
                    </button>
                  )}

                  <button 
                    onClick={() => generateQuiz(false, false)}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-600/30 hover:scale-105 active:scale-95 text-base"
                  >
                    <Play size={20} />
                    Standard Test ({Math.min(mockTestSize, questions.length)} Qs)
                  </button>

                  <button 
                    onClick={() => generateQuiz(false, true)}
                    className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-purple-600/30 hover:scale-105 active:scale-95 text-base"
                  >
                    <Activity size={20} />
                    Marathon Mode
                  </button>

                  <button 
                    onClick={handleStudyModeClick}
                    className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-emerald-600/30 hover:scale-105 active:scale-95 text-base"
                  >
                    <GraduationCap size={20} />
                    Study & Review
                  </button>
                  
                  <button 
                    onClick={() => setCurrentScreen('analysis')}
                    className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-100 font-bold py-4 px-5 rounded-xl flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 text-base shadow-sm"
                  >
                    <BarChart3 size={20} />
                    View Stats
                  </button>
                </div>

                {/* Home Stats Footer */}
                {quizHistory.length > 0 && (
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 sm:p-8 border border-slate-100 dark:border-slate-700/50 shadow-sm flex flex-col sm:flex-row flex-wrap items-center justify-around gap-6 sm:gap-8">
                    <div className="text-center">
                      <p className="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Preparedness</p>
                      <p className="text-4xl font-black text-indigo-600 dark:text-indigo-400">{preparednessScore}%</p>
                    </div>
                    <div className="hidden sm:block w-px h-16 bg-slate-200 dark:bg-slate-700"></div>
                    <div className="text-center">
                      <p className="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Tests Taken</p>
                      <p className="text-4xl font-black text-slate-800 dark:text-slate-50">{quizHistory.length}</p>
                    </div>
                    <div className="hidden sm:block w-px h-16 bg-slate-200 dark:bg-slate-700"></div>
                    <div className="text-center">
                      <p className="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Avg Score</p>
                      <p className="text-4xl font-black text-slate-800 dark:text-slate-50">
                        {Math.round(quizHistory.reduce((sum, entry) => sum + getScoreValue(entry), 0) / quizHistory.length)}<span className="text-2xl text-slate-400 dark:text-slate-500">/{Math.round(quizHistory.reduce((sum, entry) => sum + getTotalValue(entry), 0) / quizHistory.length)}</span>
                      </p>
                    </div>
                  </div>
                )}
                
                <div className="mt-8 text-center pb-4">
                  <p className="text-slate-400 dark:text-slate-500 text-sm font-bold">App Version {APP_VERSION}</p>
                </div>
              </div>
            );
          };

          const renderQuiz = () => {
            const question = activeQuestions[currentIndex];
            const hasAnswered = showExplanation;
            const isCorrect = userAnswers[currentIndex] === question?.correctAnswer;
            const progress = ((currentIndex) / activeQuestions.length) * 100;

            if (!question) return null;

            return (
              <div className="max-w-4xl mx-auto py-4 px-2 sm:px-4">
                <div className="mb-4">
                  <div className="flex justify-between items-center text-xs sm:text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2 gap-3">
                    <span className="text-sm uppercase tracking-wider font-bold">Question {currentIndex + 1} of {activeQuestions.length}</span>
                    
                    <div className="flex items-center gap-2">
                      <div className="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm text-slate-700 dark:text-slate-300 font-mono text-sm">
                        <Clock size={15} className="animate-pulse text-blue-500" />
                        <span>{formatTime(elapsedTime)}</span>
                      </div>
                      <span className="px-3 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 rounded-full border border-indigo-100 dark:border-indigo-800/50 shadow-sm">{question.category}</span>
                    </div>
                  </div>
                  <div className="w-full bg-slate-200 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden shadow-inner">
                    <div 
                      className="bg-blue-500 dark:bg-blue-400 h-full rounded-full transition-all duration-500 ease-out relative"
                      style={{ width: `${progress}%` }}
                    >
                      <div className="absolute inset-0 bg-white/20 dark:bg-white/10 w-full h-full"></div>
                    </div>
                  </div>
                </div>

                <div key={question.id} className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 p-4 sm:p-6 animate-in slide-in-from-right-8 duration-300">
                  <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-slate-50 mb-4 leading-tight tracking-tight">{question.text}</h2>
                  
                  <div className="space-y-3">
                    {question.options.map((option, idx) => {
                      let btnClass = "w-full text-left p-3 sm:p-4 rounded-xl border-2 text-base sm:text-lg font-medium leading-snug ";
                      
                      if (!hasAnswered) {
                        btnClass += "border-slate-200 dark:border-slate-700 hover:border-blue-400 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-slate-700 dark:text-slate-200 shadow-sm hover:shadow";
                      } else {
                        if (option === question.correctAnswer) {
                          btnClass += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 shadow-sm";
                        } else if (option === userAnswers[currentIndex]) {
                          btnClass += "border-red-400 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 shadow-sm";
                        } else {
                          btnClass += "border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 text-slate-400 dark:text-slate-500 opacity-50 cursor-not-allowed";
                        }
                      }

                      return (
                        <button
                          key={`${question.id}-${idx}`}
                          onClick={() => handleAnswer(option)}
                          disabled={hasAnswered}
                          className={btnClass}
                        >
                          <div className="flex items-center justify-between gap-3">
                            <span>{option}</span>
                            {hasAnswered && option === question.correctAnswer && <CheckCircle2 className="text-green-500 shrink-0" size={24}/>}
                            {hasAnswered && option === userAnswers[currentIndex] && option !== question.correctAnswer && <XCircle className="text-red-500 shrink-0" size={24}/>}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* MODAL POPUP FOR EXPLANATION & MEMORY TIPS */}
                {hasAnswered && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
                    <div className={`w-full max-w-lg bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border-4 ${isCorrect ? 'border-green-400 dark:border-green-500' : 'border-orange-400 dark:border-orange-500'} p-6 sm:p-8 animate-in zoom-in-95 duration-300 flex flex-col max-h-[90vh] overflow-y-auto`}>
                      
                      <div className="flex items-start gap-4 mb-6">
                        <div className={`shrink-0 p-3 rounded-full ${isCorrect ? 'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400' : 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400'}`}>
                          {isCorrect ? <CheckCircle2 size={36} /> : <AlertTriangle size={36} />}
                        </div>
                        <div className="text-left w-full">
                          <h3 className={`text-2xl font-black uppercase tracking-wider mb-2 ${isCorrect ? 'text-green-600 dark:text-green-400' : 'text-orange-600 dark:text-orange-400'}`}>
                            {isCorrect ? 'Correct!' : 'Incorrect'}
                          </h3>
                          <p className="text-slate-700 dark:text-slate-300 text-lg leading-relaxed">
                            {question.explanation}
                          </p>

                          {/* Injected Memory Tip on Incorrect Answers */}
                          {!isCorrect && question.tip && (
                            <div className="mt-4 animate-in slide-in-from-bottom-2 duration-300">
                              <div className="flex items-center gap-1.5 mb-1">
                                <Brain className="text-indigo-600 dark:text-indigo-400" size={18} />
                                <h5 className="text-sm font-extrabold uppercase tracking-wider text-indigo-600 dark:text-indigo-400">Memory Trick</h5>
                              </div>
                              <p className="text-slate-700 dark:text-slate-300 text-lg leading-relaxed italic font-medium">
                                "{question.tip}"
                              </p>
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="mt-auto pt-6 border-t border-slate-100 dark:border-slate-700">
                        {isCorrect && autoNavigate && !isAutoNavCancelled ? (
                          <div className="flex flex-col gap-4">
                            <div className="w-full bg-slate-200 dark:bg-slate-700 h-3 rounded-full overflow-hidden shadow-inner">
                              <div 
                                className="bg-blue-500 dark:bg-blue-400 h-full ease-linear"
                                style={{ width: `${autoNavProgress}%`, transition: 'width 30ms linear' }}
                              ></div>
                            </div>
                            <div className="flex justify-between items-center gap-4">
                              <span className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest hidden sm:inline">Next question...</span>
                              <div className="flex w-full sm:w-auto gap-2">
                                <button 
                                  onClick={() => setIsAutoNavCancelled(true)}
                                  className="flex-1 sm:flex-initial bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-800 dark:text-slate-200 px-4 py-3 rounded-xl font-bold transition-colors flex items-center justify-center gap-2 text-base whitespace-nowrap"
                                >
                                  <X size={20} />
                                  Wait
                                </button>
                                <button 
                                  onClick={nextQuestion}
                                  className="flex-1 sm:flex-initial bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold transition-colors flex items-center justify-center gap-2 text-base shadow-md hover:scale-[1.02] active:scale-95 whitespace-nowrap"
                                >
                                  Next
                                  <ArrowRight size={20} />
                                </button>
                              </div>
                            </div>
                          </div>
                        ) : (
                          <button 
                            onClick={nextQuestion}
                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg hover:scale-[1.02] active:scale-95 text-xl sm:text-lg"
                          >
                            {currentIndex < activeQuestions.length - 1 ? 'Next Question' : 'View Results'}
                            <ArrowRight size={24} className="sm:w-5 sm:h-5" />
                          </button>
                        )}
                      </div>

                    </div>
                  </div>
                )}
              </div>
            );
          };

          const renderStudy = () => {
            const question = questions[studyIndex];
            if (!question) return null;
            const progress = ((studyIndex + 1) / questions.length) * 100;

            return (
              <div className="max-w-4xl mx-auto py-4 px-2 sm:px-4">
                <div className="mb-4">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end text-xs sm:text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2 gap-3">
                    <div className="flex items-center gap-2">
                      <GraduationCap className="text-emerald-600 dark:text-emerald-400" size={20} />
                      <span className="text-sm uppercase tracking-wider font-bold">Study Mode — Question {studyIndex + 1} of {questions.length}</span>
                    </div>
                    
                    <div className="flex items-center gap-2">
                      <span className="px-3 py-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 rounded-full border border-emerald-100 dark:border-emerald-800/50 shadow-sm">{question.category}</span>
                    </div>
                  </div>
                  <div className="w-full bg-slate-200 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden shadow-inner">
                    <div 
                      className="bg-emerald-500 dark:bg-emerald-400 h-full rounded-full transition-all duration-300 ease-out"
                      style={{ width: `${progress}%` }}
                    />
                  </div>
                </div>

                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 p-4 sm:p-6 animate-in slide-in-from-right-8 duration-300">
                  <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-slate-50 mb-4 leading-tight tracking-tight">{question.text}</h2>
                  
                  <div className="space-y-2 mb-4">
                    {studyOptions.map((option, idx) => {
                      const isCorrectAnswer = option === question.correctAnswer;
                      let btnClass = "w-full text-left p-2.5 sm:p-3 rounded-xl border-2 text-base sm:text-lg font-medium leading-snug ";
                      
                      if (isCorrectAnswer) {
                        btnClass += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 shadow-sm";
                      } else {
                        btnClass += "border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 text-slate-400 dark:text-slate-500 opacity-60 cursor-not-allowed";
                      }

                      return (
                        <div key={idx} className={btnClass}>
                          <div className="flex items-center justify-between gap-3">
                            <span>{option}</span>
                            {isCorrectAnswer && <CheckCircle2 className="text-green-500 shrink-0" size={24}/>}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Fact & Mnemonic Details Container */}
                  <div className="flex flex-col gap-2.5 mb-5">
                    <div className="p-3 sm:p-4 rounded-xl border-2 shadow-sm bg-emerald-50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-800/50">
                      <div className="flex gap-3">
                        <div className="shrink-0 p-1.5 rounded-full h-fit bg-emerald-100 dark:bg-emerald-800/30 text-emerald-600 dark:text-emerald-400">
                          <Info size={20} />
                        </div>
                        <div>
                          <h4 className="text-base sm:text-lg font-extrabold mb-1 uppercase tracking-wider text-emerald-800 dark:text-emerald-400">
                            Explanation & Fact
                          </h4>
                          <p className="text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
                            {question.explanation}
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* Integrated Memory Trick Display */}
                    {question.tip && (
                      <div className="p-3 sm:p-4 rounded-xl border-2 shadow-sm bg-indigo-50 dark:bg-indigo-900/10 border-indigo-200 dark:border-indigo-800/50 animate-in fade-in duration-300">
                        <div className="flex gap-3">
                          <div className="shrink-0 p-1.5 rounded-full h-fit bg-indigo-100 dark:bg-indigo-800/30 text-indigo-600 dark:text-indigo-400">
                            <Brain size={20} />
                          </div>
                          <div>
                            <h4 className="text-base sm:text-lg font-extrabold mb-1 uppercase tracking-wider text-indigo-800 dark:text-indigo-400">
                              Memory Trick
                            </h4>
                            <p className="text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed italic font-medium">
                              "{question.tip}"
                            </p>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="flex items-center justify-between gap-4">
                    <button 
                      onClick={() => studyIndex > 0 && setStudyIndex(studyIndex - 1)}
                      disabled={studyIndex === 0}
                      className={`flex items-center gap-1 px-4 py-2.5 rounded-xl font-bold transition-all text-base ${studyIndex === 0 ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200'}`}
                    >
                      <ChevronLeft size={20} />
                      Prev
                    </button>

                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="bg-slate-900 dark:bg-blue-600 hover:bg-slate-800 dark:hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow-md text-base"
                    >
                      Exit Study
                    </button>

                    <button 
                      onClick={() => {
                        if (studyIndex < questions.length - 1) {
                          setStudyIndex(studyIndex + 1);
                        } else {
                          setCurrentScreen('home');
                        }
                      }}
                      className="flex items-center gap-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2.5 rounded-xl transition-all shadow-md text-base"
                    >
                      {studyIndex === questions.length - 1 ? 'Finish' : 'Next'}
                      <ChevronRight size={20} />
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderResults = () => {
            const score = calculateScore();
            const totalQs = activeQuestions.length;
            const passTarget = Math.ceil(totalQs * 0.75);
            const isPass = score >= passTarget; 

            return (
              <div className="max-w-3xl mx-auto py-6 px-4 sm:px-6 animate-in zoom-in duration-300">
                <div className="bg-white dark:bg-slate-800 p-6 sm:p-10 rounded-2xl shadow-xl text-center border border-slate-100 dark:border-slate-700/50">
                  <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner ${isPass ? 'bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400' : 'bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400'}`}>
                    <Trophy size={40} />
                  </div>
                  
                  <h2 className="text-3xl font-black text-slate-800 dark:text-slate-50 mb-2 tracking-tight">
                    {isPass ? 'Congratulations! You Passed' : 'Keep Studying! You Failed'}
                  </h2>
                  <p className="text-base text-slate-500 dark:text-slate-400 mb-6 font-medium">You need {passTarget} out of {totalQs} (75%) to pass.</p>
                  
                  <div className="flex flex-col items-center justify-center gap-2 mb-6">
                    <div className="text-6xl font-black text-slate-800 dark:text-slate-50 tracking-tighter">
                      {score}<span className="text-4xl text-slate-400 dark:text-slate-500">/{totalQs}</span>
                    </div>
                    <div className="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold px-3.5 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 mt-2">
                      <Clock size={16} className="text-blue-500" />
                      <span>Time Taken: {formatTimeReadable(finalTestTime)}</span>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4 justify-center mt-6">
                    <button 
                      onClick={() => setCurrentScreen('analysis')}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-indigo-500/30 hover:scale-105 active:scale-95 text-base"
                    >
                      Analyze My Weaknesses
                    </button>
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-100 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 text-base"
                    >
                      <Home size={20} />
                      Return Home
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderAnalysis = () => {
            const stats = getCategoryStats();
            // Show all categories to maintain the dashboard layout even at 0 tests
            const categories = questions.length > 0 ? [...new Set(questions.map(q => q.category))] : [];
            const weakCount = getWeakQuestionsCount();
            
            const totalTests = quizHistory.length;
            const passedTests = quizHistory.filter(s => getScoreValue(s) >= Math.ceil(getTotalValue(s) * 0.75)).length;
            const passRate = totalTests > 0 ? Math.round((passedTests / totalTests) * 100) : 0;
            
            const uniqueQuestionsSeen = Object.keys(questionHistory).length;
            const coveragePercent = questions.length > 0 ? Math.round((uniqueQuestionsSeen / questions.length) * 100) : 0;
            
            const totalTimeTakenSecs = quizHistory.reduce((sum, entry) => sum + (entry.timeTaken || 0), 0);
            const estTimeMins = totalTimeTakenSecs > 0 ? Math.round(totalTimeTakenSecs / 60) : Math.round((Object.values(questionHistory).reduce((sum, q) => sum + q.attempts, 0) * 15) / 60);
            
            let totalSeenAttempts = 0;
            let totalSeenCorrect = 0;
            Object.values(questionHistory).forEach(stats => {
                totalSeenAttempts += stats.attempts;
                totalSeenCorrect += stats.correct;
            });
            const overallAccuracy = totalSeenAttempts > 0 ? (totalSeenCorrect / totalSeenAttempts) * 100 : 0;
            
            const preparednessScore = Math.min(100, Math.round((coveragePercent / 100) * overallAccuracy)) || 0;

            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                
                {/* Header */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                  <div className="flex items-center gap-4">
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="p-2.5 bg-white dark:bg-slate-800 rounded-full shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors"
                    >
                      <Home size={20} />
                    </button>
                    <div>
                      <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800 dark:text-slate-50 tracking-tight">Performance Analytics</h2>
                      <p className="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">Based on {totalTests} mock tests taken</p>
                    </div>
                  </div>

                  {weakCount > 0 && (
                    <button 
                      onClick={() => generateQuiz(true)}
                      className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md hover:scale-105 active:scale-95 shrink-0 text-sm sm:text-base w-full sm:w-auto"
                    >
                      <Target size={18} />
                      Practice Weak Areas ({weakCount} Qs)
                    </button>
                  )}
                </div>

                {/* Motivational Banner when 0 tests taken */}
                {totalTests === 0 && (
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-2xl p-5 mb-8 flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left shadow-sm">
                    <div className="w-12 h-12 bg-blue-100 dark:bg-blue-800/50 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center shrink-0">
                      <Trophy size={24} />
                    </div>
                    <div className="flex-1">
                      <h3 className="text-lg font-bold text-blue-800 dark:text-blue-300 mb-1">Ready to track your progress?</h3>
                      <p className="text-sm text-blue-600 dark:text-blue-400">You haven't taken any mock tests yet. Your dashboard is currently empty. Take your first test to build your stats and improve your preparedness score!</p>
                    </div>
                    <button 
                      onClick={() => generateQuiz(false)}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow-md hover:scale-105 active:scale-95 shrink-0 whitespace-nowrap"
                    >
                      Start Mock Test
                    </button>
                  </div>
                )}

                {/* Top Metrics Grid */}
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  
                  {/* Preparedness Score */}
                  <div className="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden">
                    <div className="relative z-10">
                      <div className="flex justify-between items-start mb-2">
                        <p className="text-indigo-100 text-xs sm:text-sm font-bold uppercase tracking-wider">Preparedness</p>
                        <Brain size={20} className="text-indigo-200" />
                      </div>
                      <div className="flex items-end gap-2">
                        <span className="text-4xl font-black">{preparednessScore}%</span>
                      </div>
                      <p className="text-xs text-indigo-200 mt-2 font-medium">Based on {coveragePercent}% coverage & {Math.round(overallAccuracy)}% accuracy</p>
                    </div>
                    <Activity size={100} className="absolute -right-4 -bottom-4 text-white opacity-10" />
                  </div>

                  {/* Pass Rate */}
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm flex flex-col justify-between">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-500 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Pass Rate</p>
                      <div className={`p-1.5 rounded-lg ${passRate >= 75 ? 'bg-green-100 text-green-600 dark:bg-green-900/30' : 'bg-red-100 text-red-600 dark:bg-red-900/30'}`}>
                        <Trophy size={16} />
                      </div>
                    </div>
                    <div>
                      {/* FIX: Properly formatted ternary operator using quoted strings for Tailwind classes */}
                      <span className={`text-3xl font-black ${passRate >= 75 ? 'text-green-600 dark:text-green-400' : 'text-slate-800 dark:text-slate-50'}`}>{passRate}%</span>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">{passedTests} passed out of {totalTests}</p>
                    </div>
                  </div>

                  {/* Bank Coverage */}
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm flex flex-col justify-between">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-500 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Questions Coverage</p>
                      <div className="p-1.5 rounded-lg bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400">
                        <PieChart size={16} />
                      </div>
                    </div>
                    <div>
                      <span className="text-3xl font-black text-slate-800 dark:text-slate-50">{coveragePercent}%</span>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">{uniqueQuestionsSeen} of {questions.length} unique questions</p>
                    </div>
                  </div>

                  {/* Est Time Spent */}
                  <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm flex flex-col justify-between">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-500 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Time Practicing</p>
                      <div className="p-1.5 rounded-lg bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400">
                        <Clock size={16} />
                      </div>
                    </div>
                    <div>
                      <div className="flex items-baseline gap-1">
                        <span className="text-3xl font-black text-slate-800 dark:text-slate-50">{estTimeMins}</span>
                        <span className="text-sm font-bold text-slate-500 dark:text-slate-400 mb-1">mins</span>
                      </div>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">Across active training sessions</p>
                    </div>
                  </div>
                </div>

                {/* Detailed Category Analysis */}
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 p-5 sm:p-8 mb-8">
                  <h3 className="text-xl font-extrabold text-slate-800 dark:text-slate-50 mb-6 flex items-center gap-2">
                    <BookOpen size={20} className="text-blue-500" />
                    Syllabus Breakdown
                  </h3>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {categories.map(cat => {
                      const catStats = stats[cat] || { total: 0, correct: 0, incorrect: 0, unseen: 0 };
                      const { total, correct, incorrect, unseen } = catStats;
                      
                      const correctPct = total > 0 ? (correct / total) * 100 : 0;
                      const incorrectPct = total > 0 ? (incorrect / total) * 100 : 0;
                      
                      // Overall coverage percentage in this specific category
                      const coveragePct = total > 0 ? Math.round(((correct + incorrect) / total) * 100) : 0;
                      const isComplete = coveragePct === 100;

                      return (
                        <div key={cat} className="p-6 rounded-2xl border bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 shadow-sm transition-colors flex flex-col items-center text-center gap-4 hover:shadow-md">
                          
                          <div className="flex items-center justify-center gap-2 flex-wrap w-full">
                            <h3 className="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100">{cat}</h3>
                            {incorrect > 0 && <AlertTriangle size={18} className="text-orange-500 dark:text-orange-400 shrink-0" />}
                            {isComplete && incorrect === 0 && <CheckCircle2 size={18} className="text-green-500 dark:text-green-400 shrink-0" />}
                          </div>

                          {/* BIG Donut Chart */}
                          <div 
                            className="w-32 h-32 sm:w-40 sm:h-40 rounded-full relative flex items-center justify-center shadow-md my-2 shrink-0"
                            style={{
                              background: `conic-gradient(#22c55e 0% ${correctPct}%, #f97316 ${correctPct}% ${correctPct + incorrectPct}%, ${isDarkMode ? '#334155' : '#cbd5e1'} ${correctPct + incorrectPct}% 100%)`
                            }}
                          >
                            <div className="w-20 h-20 sm:w-28 sm:h-28 bg-slate-50 dark:bg-slate-800/90 rounded-full absolute shadow-inner flex flex-col items-center justify-center">
                               <span className="text-2xl sm:text-3xl font-black text-slate-700 dark:text-slate-200">{coveragePct}%</span>
                               <span className="text-[10px] sm:text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mt-0.5">Covered</span>
                            </div>
                          </div>

                          {/* Legend / Stats block */}
                          <div className="flex flex-col items-center gap-2 text-xs sm:text-sm w-full mt-2">
                            <div className="flex items-center justify-center gap-1.5 text-slate-600 dark:text-slate-400 font-bold bg-white dark:bg-slate-900 px-3 py-1 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 w-full max-w-[160px]">
                                <span className="w-2.5 h-2.5 rounded-full bg-slate-400 dark:bg-slate-500 shrink-0"></span>
                                {total} Total Qs
                            </div>
                            <div className="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 mt-1">
                                <div className="flex items-center gap-1.5 text-green-700 dark:text-green-400 font-bold">
                                    <span className="w-2.5 h-2.5 rounded-full bg-green-500 shrink-0"></span>
                                    {correct} Mastered
                                </div>
                                <div className="flex items-center gap-1.5 text-orange-700 dark:text-orange-400 font-bold">
                                    <span className="w-2.5 h-2.5 rounded-full bg-orange-500 shrink-0"></span>
                                    {incorrect} Weak
                                </div>
                                <div className="flex items-center gap-1.5 text-slate-500 dark:text-slate-500 font-bold">
                                    <span className="w-2.5 h-2.5 rounded-full bg-slate-200 dark:bg-slate-600 border border-slate-300 dark:border-slate-500 shrink-0"></span>
                                    {unseen} Unseen
                                </div>
                            </div>
                          </div>

                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="flex justify-center pb-8">
                  <button 
                    onClick={() => generateQuiz(false)}
                    className="bg-slate-900 dark:bg-blue-600 hover:bg-slate-800 dark:hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl flex items-center gap-2 transition-all shadow-lg hover:scale-105 active:scale-95 text-base w-full sm:w-auto justify-center"
                  >
                    <RefreshCcw size={20} />
                    Take a New Mock Test
                  </button>
                </div>
              </div>
            );
          };

          const renderSettings = () => {
            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                {/* Header */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                  <div className="flex items-center gap-4">
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="p-2.5 bg-white dark:bg-slate-800 rounded-full shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors"
                    >
                      <Home size={20} />
                    </button>
                    <div>
                      <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800 dark:text-slate-50 tracking-tight">App Settings</h2>
                      <p className="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">Configure your training experience</p>
                    </div>
                  </div>
                  <div className="bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm self-start sm:self-auto">
                    Version {APP_VERSION}
                  </div>
                </div>

                {/* Main Settings Form */}
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700/50 p-6 sm:p-8 space-y-8">
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      {/* Column 1 */}
                      <div className="space-y-8">
                          {/* Mock Test Size Configuration */}
                          <div className="space-y-3">
                            <label className="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                              <Target size={18} className="text-blue-500" />
                              Mock Test Question Count
                            </label>
                            <select
                              value={mockTestSize}
                              onChange={(e) => setMockTestSize(Number(e.target.value))}
                              className="w-full font-bold bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3.5 text-slate-700 dark:text-slate-200 outline-none cursor-pointer focus:border-blue-500 transition-colors"
                            >
                              <option value={10}>10 Questions</option>
                              <option value={15}>15 Questions</option>
                              <option value={20}>20 Questions</option>
                              <option value={24}>24 Questions (Official Standard)</option>
                              <option value={40}>40 Questions</option>
                              <option value={50}>50 Questions</option>
                            </select>
                          </div>

                          {/* Question Database Status Indicators */}
                          <div className="space-y-3">
                             <label className="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                              <Brain size={18} className="text-blue-500" />
                              Question Source Data
                            </label>
                            <div className="p-4 rounded-xl border bg-slate-50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 space-y-3">
                              <div className="flex items-center justify-between">
                                <span className="text-sm font-bold text-slate-600 dark:text-slate-400">Database Size</span>
                                <span className="text-xs font-black px-2.5 py-0.5 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400 rounded-md border border-blue-200 dark:border-blue-800">{questions.length} Questions</span>
                              </div>
                              <div className="flex items-center justify-between">
                                <span className="text-sm font-bold text-slate-600 dark:text-slate-400">Active Source</span>
                                <span className={`text-xs font-black uppercase tracking-wider px-2.5 py-0.5 rounded-md border ${usingExternal ? 'bg-green-50 dark:bg-green-950/30 border-green-200 dark:border-green-900 text-green-700 dark:text-green-400' : 'bg-amber-50 dark:bg-amber-950/30 border-amber-200 dark:border-amber-900 text-amber-700 dark:text-amber-400'}`}>
                                  {usingExternal ? 'questions_bank.js' : 'Default Samples'}
                                </span>
                              </div>
                              {!usingExternal && (
                                <p className="text-[11px] leading-relaxed text-slate-500 dark:text-slate-400 mt-2">
                                  To load your entire 300+ custom question database, simply upload a <code>questions_bank.js</code> file in the same directory.
                                </p>
                              )}
                            </div>
                          </div>
                      </div>

                      {/* Column 2 */}
                      <div className="space-y-8">
                          {/* Auto-next Toggle */}
                          <div className="space-y-3">
                            <label className="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                              <Play size={18} className="text-blue-500" />
                              Auto-next Questions
                            </label>
                            <div className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700">
                              <div>
                                <span className="text-sm font-bold text-slate-800 dark:text-slate-200 block">Advance on correct answers</span>
                                <span className="text-xs text-slate-500 dark:text-slate-400">Jump to next automatically</span>
                              </div>
                              <input
                                type="checkbox"
                                checked={autoNavigate}
                                onChange={(e) => setAutoNavigate(e.target.checked)}
                                className="w-5 h-5 rounded text-blue-600 focus:ring-blue-500 cursor-pointer accent-blue-600"
                              />
                            </div>
                          </div>

                          {/* Delay Speed Select */}
                          {autoNavigate && (
                            <div className="space-y-3 animate-in fade-in slide-in-from-top-2 duration-300">
                              <label className="text-sm font-bold text-slate-700 dark:text-slate-300">Auto-next Delay Time</label>
                              <select
                                value={autoNavDelay}
                                onChange={(e) => setAutoNavDelay(Number(e.target.value))}
                                className="w-full font-bold bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3.5 text-slate-700 dark:text-slate-200 outline-none cursor-pointer focus:border-blue-500 transition-colors"
                              >
                                <option value={1}>1 Second</option>
                                <option value={2}>2 Seconds</option>
                                <option value={3}>3 Seconds</option>
                                <option value={5}>5 Seconds</option>
                              </select>
                            </div>
                          )}
                      </div>
                  </div>

                  <hr className="border-slate-200 dark:border-slate-700" />

                  {/* Reset History / Local Storage */}
                  <div>
                      <button
                        onClick={() => {
                          if (window.confirm("Are you sure you want to clear your stats, failed questions memory, and exam history? This cannot be undone.")) {
                            localStorage.clear();
                            window.location.reload();
                          }
                        }}
                        className="w-full border-2 border-red-200 dark:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-950/20 text-red-600 dark:text-red-400 font-bold py-3.5 rounded-xl transition-all text-base flex items-center justify-center gap-2"
                      >
                        <RefreshCcw size={18} />
                        Reset Progress & Stats
                      </button>
                  </div>
                </div>
              </div>
            );
          };

          // Render Loading Indicator while Scanning for external JS file
          if (loadingQuestions) {
            return (
              <div className="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center p-4 transition-colors duration-300">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 dark:border-blue-400 mb-4"></div>
                <p className="text-slate-600 dark:text-slate-300 font-bold text-lg">Scanning for questions_bank.js...</p>
                <p className="text-xs text-slate-400 dark:text-slate-500 mt-2 font-medium">Falling back to default sample bank if not found</p>
              </div>
            );
          }

          return (
            <div className={`${isDarkMode ? 'dark' : ''}`}>
              <div className="min-h-screen bg-slate-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">
                <header className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700/50 sticky top-0 z-50 shadow-sm">
                  <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-black text-xl cursor-pointer tracking-tight" onClick={() => setCurrentScreen('home')}>
                      <BookOpen size={24} />
                      <span className="hidden sm:inline">UK Life Prep</span>
                    </div>
                    
                    <div className="flex items-center gap-1 sm:gap-3">
                      <div className="hidden md:flex items-center justify-center p-1.5 rounded-full text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 mr-1">
                        {isDarkMode ? <Moon size={16} /> : <Sun size={16} />}
                      </div>

                      <button 
                        onClick={() => setCurrentScreen('home')}
                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors ${currentScreen === 'home' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}
                      >
                        <Home size={18} />
                        <span className="hidden sm:inline">Home</span>
                      </button>
                      
                      <button 
                        onClick={() => setCurrentScreen('analysis')}
                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors ${currentScreen === 'analysis' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}
                      >
                        <BarChart3 size={18} />
                        <span className="hidden sm:inline">Stats</span>
                      </button>

                      {/* Settings Gear Button */}
                      <button 
                        onClick={() => setCurrentScreen('settings')}
                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors ${currentScreen === 'settings' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}
                        title="Configure App Settings"
                      >
                        <Settings size={18} />
                        <span className="hidden sm:inline">Settings</span>
                      </button>
