<body class="antialiased bg-slate-100 dark:bg-[#0f172a] font-sans transition-colors duration-300">
    <div id="root"></div>

    <!-- Your React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          BookOpen, Trophy, AlertTriangle, CheckCircle2, XCircle, 
          RefreshCcw, ArrowRight, Play, Home, BarChart3, Info, Brain, Moon, Sun, Target, X,
          Clock, PieChart, Activity, ChevronLeft, ChevronRight, GraduationCap, Settings, Eye, EyeOff, Monitor
        } from 'lucide-react';

        /* DEFAULT 10 SAMPLE QUESTIONS DATABANK FOR LOCAL FALLBACK WITH MEMORY TIPS */
        const defaultRawData = [
          [1, "History", "Which two languages were used across England during the Middle Ages?", ["Welsh and Gaelic", "Norman French and Anglo-Saxon", "Latin and Celtic", "Nordic and English"], 1, "The king and noblemen spoke Norman French; peasants spoke Anglo-Saxon.", "French for the fancy folks at court, Saxon for the struggling peasants!"],
          [2, "History", "In 1776, which British colonies declared their independence?", ["North African", "Asian", "North American", "South African"], 2, "13 North American colonies declared independence over 'no taxation without representation'.", "America said: 'No tea tax, we want our own map!' in 1776."],
          [3, "History", "When was England ruled by a republic and not by a monarch?", ["When Elizabeth I died", "When Charles I was executed", "When the Magna Carta was signed", "After the Battle of Hastings"], 1, "After Charles I was executed in 1649, England became a republic called the Commonwealth.", "Oliver Cromwell put a 'well' over the Crown (republic) after Charles lost his head in 1649."],
          [4, "Culture & Society", "Which of the following is one of the highest-grossing film franchises produced in the UK?", ["Harry Potter", "Spider-man", "The Lord of the Rings", "Indiana Jones"], 0, "Harry Potter and James Bond are two of the highest-grossing UK film franchises.", "Potter and Bond are the ultimate UK cash goldmines."],
          [5, "History", "When did the first farmers come to Britain?", ["10,000 years ago", "6,000 years ago", "15,000 years ago", "2,000 years ago"], 1, "The first farmers arrived in Britain about 6,000 years ago from south-east Europe.", "Farming has 6 letters -> 6,000 years ago!"],
          [6, "History", "When did the First World War end?", ["12.00 pm 11th Nov 1914", "12.00 pm 11th Nov 1918", "11.00 am 11th Nov 1914", "11.00 am 11th Nov 1918"], 3, "WWI ended at 11.00 am on 11th November 1918.", "The 11th hour of the 11th day of the 11th month in 1918. All the 11s!"],
          [7, "Laws & Gov", "Can court orders be obtained to protect a person from being forced into a marriage?", ["Yes", "No"], 0, "True. Forced Marriage Protection Orders protect people from being forced into a marriage.", "The law always says YES to protecting your choice of who you marry."],
          [8, "Sports & Leisure", "What medal did Mary Peters win in the 1972 Olympics?", ["No medals", "Silver", "Gold", "Bronze"], 2, "She won an Olympic gold medal in the pentathlon in 1972.", "Mary Peters won pure gold in her running gears."],
          [9, "Laws & Gov", "In England, Wales and NI, Youth Court cases are normally heard by (choose two):", ["Up to 3 specially trained magistrates AND a District Judge", "A sheriff AND a jury", "Members of the public", "High Court Judges"], 0, "Cases are heard by up to 3 specially trained magistrates or a District Judge. Public are not allowed.", "Three key people keep youth cases quiet and private."],
          [10, "People", "What was invented by Alan Turing in the 1930s?", ["The jet engine", "The television", "The Turing machine", "The ball pen"], 2, "A Turing machine is a theoretical mathematical device that influenced modern computers.", "Turing invented the Turing machine — his name is right in the answer!"]
        ];

        const DEFAULT_QUESTION_BANK = defaultRawData.map(d => ({
          id: d[0],
          category: d[1],
          text: d[2],
          options: d[3],
          correctAnswer: d[3][d[4]],
          explanation: d[5],
          tip: d[6] || ""
        }));

        const APP_VERSION = "v3.1";

        function App() {
          const [currentScreen, setCurrentScreen] = useState('home'); // home, quiz, results, analysis, study, settings
          const [activeQuestions, setActiveQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [userAnswers, setUserAnswers] = useState({});
          
          // Theme States
          const [themePreference, setThemePreference] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeTheme');
              return saved ? saved : 'system';
            } catch(e) { return 'system'; }
          });
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          // Test Timer States
          const [elapsedTime, setElapsedTime] = useState(0);
          const [finalTestTime, setFinalTestTime] = useState(0);

          // Study Resume Prompt Modal state
          const [isStudyResumeModalOpen, setIsStudyResumeModalOpen] = useState(false);

          // Auto-navigate states
          const [autoNavProgress, setAutoNavProgress] = useState(0);
          const [isAutoNavCancelled, setIsAutoNavCancelled] = useState(false);

          // Persistent Settings States
          const [autoNavigate, setAutoNavigate] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeAutoNav');
              return saved !== null ? JSON.parse(saved) : true;
            } catch(e) { return true; }
          });

          const [autoNavDelay, setAutoNavDelay] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeAutoNavDelay');
              return saved ? parseInt(saved, 10) : 3;
            } catch(e) { return 3; }
          });

          const [mockTestSize, setMockTestSize] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeMockTestSize');
              return saved ? parseInt(saved, 10) : 24;
            } catch(e) { return 24; }
          });

          const [hideIncorrectStudy, setHideIncorrectStudy] = useState(() => {
            try {
              const saved = localStorage.getItem('ukLifeHideIncorrect');
              return saved !== null ? JSON.parse(saved) : true;
            } catch(e) { return true; }
          });

          // Dynamic Question Bank States (Dual Engine)
          const [standardQuestions, setStandardQuestions] = useState([]);
          const [examQuestions, setExamQuestions] = useState([]);
          const [loadingQuestions, setLoadingQuestions] = useState(true);
          const [usingExternal, setUsingExternal] = useState(false);
          const [hasExamBank, setHasExamBank] = useState(false);
          const [activeBankMode, setActiveBankMode] = useState(() => {
            try { return localStorage.getItem('ukLifeActiveBankMode') || 'standard'; } catch(e) { return 'standard'; }
          });

          // Histories & Study Indexes (Separated for Standard vs Exam to keep stats pure)
          const [standardStudyIndex, setStandardStudyIndex] = useState(() => {
            try { return parseInt(localStorage.getItem('ukLifeStudyIndex'), 10) || 0; } catch(e) { return 0; }
          });
          const [examStudyIndex, setExamStudyIndex] = useState(() => {
            try { return parseInt(localStorage.getItem('ukLifeExamStudyIndex'), 10) || 0; } catch(e) { return 0; }
          });
          
          const [standardQuizHistory, setStandardQuizHistory] = useState(() => {
            try { return JSON.parse(localStorage.getItem('ukLifeQuizHistory')) || []; } catch(e) { return []; }
          });
          const [examQuizHistory, setExamQuizHistory] = useState(() => {
            try { return JSON.parse(localStorage.getItem('ukLifeExamQuizHistory')) || []; } catch(e) { return []; }
          });

          const [standardQuestionHistory, setStandardQuestionHistory] = useState(() => {
            try { return JSON.parse(localStorage.getItem('ukLifeQuestionHistory')) || {}; } catch(e) { return {}; }
          });
          const [examQuestionHistory, setExamQuestionHistory] = useState(() => {
            try { return JSON.parse(localStorage.getItem('ukLifeExamQuestionHistory')) || {}; } catch(e) { return {}; }
          });

          const [standardRecentlySeen, setStandardRecentlySeen] = useState(() => {
            try { return new Set(JSON.parse(localStorage.getItem('ukLifeRecentlySeen')) || []); } catch(e) { return new Set(); }
          });
          const [examRecentlySeen, setExamRecentlySeen] = useState(() => {
            try { return new Set(JSON.parse(localStorage.getItem('ukLifeExamRecentlySeen')) || []); } catch(e) { return new Set(); }
          });

          const [studyOptions, setStudyOptions] = useState([]);

          // --- DYNAMIC ALIASES (These automatically route all logic to the correct bank!) ---
          const questions = activeBankMode === 'standard' ? standardQuestions : examQuestions;
          const studyIndex = activeBankMode === 'standard' ? standardStudyIndex : examStudyIndex;
          const setStudyIndex = activeBankMode === 'standard' ? setStandardStudyIndex : setExamStudyIndex;
          const quizHistory = activeBankMode === 'standard' ? standardQuizHistory : examQuizHistory;
          const setQuizHistory = activeBankMode === 'standard' ? setStandardQuizHistory : setExamQuizHistory;
          const questionHistory = activeBankMode === 'standard' ? standardQuestionHistory : examQuestionHistory;
          const setQuestionHistory = activeBankMode === 'standard' ? setStandardQuestionHistory : setExamQuestionHistory;
          const recentlySeen = activeBankMode === 'standard' ? standardRecentlySeen : examRecentlySeen;
          const setRecentlySeen = activeBankMode === 'standard' ? setStandardRecentlySeen : setExamRecentlySeen;

          // Dynamic detection of external question files (Standard & Exam)
          useEffect(() => {
            let standardResolved = false;

            const finishLoading = () => {
              setLoadingQuestions(false);
            };

            const handleStandardFallback = () => {
              if (standardResolved) return;
              standardResolved = true;
              setStandardQuestions(DEFAULT_QUESTION_BANK);
              setUsingExternal(false);
              finishLoading();
            };

            const handleStandardSuccess = (externalData) => {
              if (standardResolved) return;
              standardResolved = true;
              const mapped = externalData.map(d => ({
                id: d[0], category: d[1], text: d[2], options: d[3], correctAnswer: d[3][d[4]], explanation: d[5], tip: d[6] || ""
              }));
              setStandardQuestions(mapped);
              setUsingExternal(true);
              finishLoading();
            };

            // 1. Load Standard Question Bank
            if (window.EXTERNAL_QUESTIONS && Array.isArray(window.EXTERNAL_QUESTIONS) && window.EXTERNAL_QUESTIONS.length > 0) {
              handleStandardSuccess(window.EXTERNAL_QUESTIONS);
            } else {
              const script = document.createElement('script');
              script.src = 'questions_bank.js';
              script.async = true;
              script.onload = () => {
                if (window.EXTERNAL_QUESTIONS && Array.isArray(window.EXTERNAL_QUESTIONS) && window.EXTERNAL_QUESTIONS.length > 0) {
                  handleStandardSuccess(window.EXTERNAL_QUESTIONS);
                } else {
                  handleStandardFallback();
                }
              };
              script.onerror = handleStandardFallback;
              document.body.appendChild(script);
            }

            // 2. Load Optional Past Exams Bank
            const handleExamSuccess = (examData) => {
              const mapped = examData.map(d => ({
                id: d[0], category: d[1], text: d[2], options: d[3], correctAnswer: d[3][d[4]], explanation: d[5], tip: d[6] || ""
              }));
              setExamQuestions(mapped);
              setHasExamBank(true);
            };

            if (window.EXAM_QUESTIONS && Array.isArray(window.EXAM_QUESTIONS) && window.EXAM_QUESTIONS.length > 0) {
              handleExamSuccess(window.EXAM_QUESTIONS);
            } else {
              const examScript = document.createElement('script');
              examScript.src = 'exam_questions.js';
              examScript.async = true;
              examScript.onload = () => {
                if (window.EXAM_QUESTIONS && Array.isArray(window.EXAM_QUESTIONS) && window.EXAM_QUESTIONS.length > 0) {
                  handleExamSuccess(window.EXAM_QUESTIONS);
                }
              };
              // Note: Intentionally no onerror fallback needed; hasExamBank remains false
              document.body.appendChild(examScript);
            }

            // Timeout safety guard (1.2s max scan time)
            const timer = setTimeout(() => {
              handleStandardFallback();
            }, 1200);

            return () => clearTimeout(timer);
          }, []);

          // Fallback sanity check: Revert to standard if exam mode is saved but file is missing
          useEffect(() => {
            if (!loadingQuestions && activeBankMode === 'exam' && !hasExamBank) {
              setActiveBankMode('standard');
            }
          }, [loadingQuestions, activeBankMode, hasExamBank]);

          // Helper to get score values safely for backwards compatibility
          const getScoreValue = (entry) => typeof entry === 'number' ? entry : entry.score;
          const getTotalValue = (entry) => typeof entry === 'number' ? 24 : entry.total;

          // Local Storage Synchronizers
          useEffect(() => { localStorage.setItem('ukLifeActiveBankMode', activeBankMode); }, [activeBankMode]);
          useEffect(() => { localStorage.setItem('ukLifeAutoNav', JSON.stringify(autoNavigate)); }, [autoNavigate]);
          useEffect(() => { localStorage.setItem('ukLifeAutoNavDelay', autoNavDelay); }, [autoNavDelay]);
          useEffect(() => { localStorage.setItem('ukLifeMockTestSize', mockTestSize); }, [mockTestSize]);
          useEffect(() => { localStorage.setItem('ukLifeHideIncorrect', JSON.stringify(hideIncorrectStudy)); }, [hideIncorrectStudy]);
          
          useEffect(() => { localStorage.setItem('ukLifeStudyIndex', standardStudyIndex.toString()); }, [standardStudyIndex]);
          useEffect(() => { localStorage.setItem('ukLifeExamStudyIndex', examStudyIndex.toString()); }, [examStudyIndex]);
          
          useEffect(() => { localStorage.setItem('ukLifeQuizHistory', JSON.stringify(standardQuizHistory)); }, [standardQuizHistory]);
          useEffect(() => { localStorage.setItem('ukLifeExamQuizHistory', JSON.stringify(examQuizHistory)); }, [examQuizHistory]);

          useEffect(() => { localStorage.setItem('ukLifeQuestionHistory', JSON.stringify(standardQuestionHistory)); }, [standardQuestionHistory]);
          useEffect(() => { localStorage.setItem('ukLifeExamQuestionHistory', JSON.stringify(examQuestionHistory)); }, [examQuestionHistory]);

          useEffect(() => { localStorage.setItem('ukLifeRecentlySeen', JSON.stringify([...standardRecentlySeen])); }, [standardRecentlySeen]);
          useEffect(() => { localStorage.setItem('ukLifeExamRecentlySeen', JSON.stringify([...examRecentlySeen])); }, [examRecentlySeen]);

          // Shuffler for Study & Review Mode Options
          useEffect(() => {
            if (currentScreen === 'study' && questions[studyIndex]) {
              setStudyOptions([...questions[studyIndex].options].sort(() => Math.random() - 0.5));
            }
          }, [studyIndex, currentScreen, questions]);

          // Comprehensive Theme Detection & Application
          useEffect(() => {
            localStorage.setItem('ukLifeTheme', themePreference);
            
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            
            const applyTheme = () => {
              if (themePreference === 'dark') {
                setIsDarkMode(true);
              } else if (themePreference === 'light') {
                setIsDarkMode(false);
              } else {
                setIsDarkMode(mediaQuery.matches);
              }
            };
            
            applyTheme();
            
            const handler = () => applyTheme();
            mediaQuery.addEventListener('change', handler);
            return () => mediaQuery.removeEventListener('change', handler);
          }, [themePreference]);

          // Live Test Timer Increment effect
          useEffect(() => {
            let timer;
            if (currentScreen === 'quiz') {
              timer = setInterval(() => {
                setElapsedTime(prev => prev + 1);
              }, 1000);
            } else {
              clearInterval(timer);
            }
            return () => clearInterval(timer);
          }, [currentScreen]);

          // Enhanced Auto-advance effect with visual progress timer
          useEffect(() => {
            let interval;
            const duration = autoNavDelay * 1000; 
            const updateInterval = 30; 
            
            const hasAnswered = userAnswers[currentIndex] !== undefined;

            if (currentScreen === 'quiz' && hasAnswered && autoNavigate && !isAutoNavCancelled) {
              const isCorrect = userAnswers[currentIndex] === activeQuestions[currentIndex]?.correctAnswer;
              if (isCorrect) {
                let elapsed = 0;
                interval = setInterval(() => {
                  elapsed += updateInterval;
                  setAutoNavProgress((elapsed / duration) * 100);
                  if (elapsed >= duration) {
                    clearInterval(interval);
                    nextQuestion();
                  }
                }, updateInterval);
              }
            }
            return () => clearInterval(interval);
          }, [currentIndex, autoNavigate, autoNavDelay, currentScreen, isAutoNavCancelled, userAnswers, activeQuestions]);

          // Format seconds into MM:SS
          const formatTime = (secs) => {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          // Format seconds into readable English (e.g. 1m 45s)
          const formatTimeReadable = (secs) => {
            if (!secs) return "0s";
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            if (m === 0) return `${s}s`;
            return `${m}m ${s}s`;
          };

          // Generates a mock test with support for standard (configurable size), weak-targeted, or marathon mode (all Qs)
          // Prioritizes completely UNSEEN questions when filling gaps
          const generateQuiz = (focusWeak = false, marathonMode = false) => {
            let pool = [];
            let updatedSeen = new Set(recentlySeen);
            const targetSize = marathonMode ? questions.length : Math.min(mockTestSize, questions.length);

            if (marathonMode) {
              pool = [...questions].sort(() => 0.5 - Math.random());
            } else if (focusWeak) {
              const weakQuestions = questions.filter(q => {
                const stats = questionHistory[q.id];
                return stats && (stats.attempts > stats.correct) && (stats.correct < 3);
              });

              const shuffledWeak = [...weakQuestions].sort(() => 0.5 - Math.random());
              pool = shuffledWeak.slice(0, targetSize);

              if (pool.length < targetSize) {
                const numNeeded = targetSize - pool.length;
                
                // Prioritize unseen questions first to fill the gap
                const unseenQuestions = questions.filter(q => !questionHistory[q.id] && !pool.includes(q));
                const shuffledUnseen = [...unseenQuestions].sort(() => 0.5 - Math.random());
                
                if (shuffledUnseen.length >= numNeeded) {
                  pool = [...pool, ...shuffledUnseen.slice(0, numNeeded)];
                } else {
                  pool = [...pool, ...shuffledUnseen];
                  const stillNeeded = targetSize - pool.length;
                  
                  let availableSeen = questions.filter(q => !pool.includes(q) && !updatedSeen.has(q.id));
                  if (availableSeen.length < stillNeeded) {
                      updatedSeen.clear();
                      availableSeen = questions.filter(q => !pool.includes(q));
                  }
                  const shuffledSeen = [...availableSeen].sort(() => 0.5 - Math.random());
                  pool = [...pool, ...shuffledSeen.slice(0, stillNeeded)];
                }
              }
            } else {
              const weakQuestions = questions.filter(q => {
                const stats = questionHistory[q.id];
                return stats && (stats.attempts > stats.correct) && (stats.correct < 3);
              });
              const shuffledWeak = [...weakQuestions].sort(() => 0.5 - Math.random());
              const selectedWeak = shuffledWeak.slice(0, Math.min(5, weakQuestions.length)); 

              const numNeeded = targetSize - selectedWeak.length;
              
              // 1. Get strictly UNSEEN questions first
              const unseenQuestions = questions.filter(q => !questionHistory[q.id] && !selectedWeak.includes(q));
              const shuffledUnseen = [...unseenQuestions].sort(() => 0.5 - Math.random());

              let selectedOther = [];

              if (shuffledUnseen.length >= numNeeded) {
                // We have enough unseen questions to fill the test
                selectedOther = shuffledUnseen.slice(0, numNeeded);
              } else {
                // Take all available unseen questions
                selectedOther = [...shuffledUnseen];
                const stillNeeded = numNeeded - selectedOther.length;

                // 2. Fallback to seen questions that aren't recently seen
                let availableSeen = questions.filter(q => 
                    questionHistory[q.id] && 
                    !selectedWeak.includes(q) && 
                    !selectedOther.includes(q) &&
                    !updatedSeen.has(q.id)
                );

                if (availableSeen.length < stillNeeded) {
                    updatedSeen.clear(); // Reset recently seen if we run out
                    availableSeen = questions.filter(q => 
                        questionHistory[q.id] && 
                        !selectedWeak.includes(q) && 
                        !selectedOther.includes(q)
                    );
                }

                const shuffledSeen = [...availableSeen].sort(() => 0.5 - Math.random());
                selectedOther = [...selectedOther, ...shuffledSeen.slice(0, stillNeeded)];
              }

              pool = [...selectedWeak, ...selectedOther].sort(() => 0.5 - Math.random());
            }

            if (!marathonMode) {
              pool.forEach(q => updatedSeen.add(q.id));
              setRecentlySeen(updatedSeen);
            }

            // Shuffle the options of each selected question in the pool
            const shuffledPool = pool.map(q => {
              const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
              return {
                ...q,
                options: shuffledOptions
              };
            });

            setActiveQuestions(shuffledPool);
            setCurrentIndex(0);
            setUserAnswers({}); 
            setIsAutoNavCancelled(false);
            setAutoNavProgress(0);
            setElapsedTime(0); // Reset timer
            setCurrentScreen('quiz');
          };

          const handleStudyModeClick = () => {
            if (studyIndex > 0) {
              setIsStudyResumeModalOpen(true);
            } else {
              setStudyIndex(0);
              setCurrentScreen('study');
            }
          };

          const handleAnswer = (answer) => {
            if (userAnswers[currentIndex] !== undefined) return; 
            const isCorrect = answer === activeQuestions[currentIndex].correctAnswer;
            const qId = activeQuestions[currentIndex].id;

            setUserAnswers(prev => ({
              ...prev,
              [currentIndex]: answer
            }));
            
            setIsAutoNavCancelled(false);
            setAutoNavProgress(0);

            // Reactive Update: Questions coverage registers instantly inside the DB tracker
            setQuestionHistory(prev => ({
                ...prev,
                [qId]: {
                    attempts: (prev[qId]?.attempts || 0) + 1,
                    correct: (prev[qId]?.correct || 0) + (isCorrect ? 1 : 0)
                }
            }));
          };

          const nextQuestion = () => {
            if (currentIndex < activeQuestions.length - 1) {
              setCurrentIndex(currentIndex + 1);
              setIsAutoNavCancelled(false);
              setAutoNavProgress(0);
            } else {
              finishQuiz();
            }
          };

          const finishQuiz = () => {
            const score = calculateScore();
            const total = activeQuestions.length;
            
            setFinalTestTime(elapsedTime);

            const newEntry = {
              score,
              total,
              timeTaken: elapsedTime,
              date: new Date().toLocaleDateString()
            };
            
            const newHistory = [...quizHistory, newEntry];
            setQuizHistory(newHistory);
            setCurrentScreen('results');
          };

          const calculateScore = () => {
            let correct = 0;
            activeQuestions.forEach((q, index) => {
              if (userAnswers[index] === q.correctAnswer) {
                correct++;
              }
            });
            return correct;
          };

          const getCategoryStats = () => {
            const stats = {};
            questions.forEach(q => {
              if (!stats[q.category]) {
                stats[q.category] = { total: 0, correct: 0, incorrect: 0, unseen: 0 };
              }
              
              stats[q.category].total += 1;
              
              const history = questionHistory[q.id];
              if (!history) {
                stats[q.category].unseen += 1;
              } else {
                const isWeak = history.attempts > history.correct && history.correct < 3;
                if (isWeak) {
                  stats[q.category].incorrect += 1;
                } else {
                  stats[q.category].correct += 1;
                }
              }
            });
            return stats;
          };
            
          const getWeakQuestionsCount = () => {
             return Object.values(questionHistory).filter(stats => (stats.attempts > stats.correct) && (stats.correct < 3)).length;
          };

          const renderHome = () => {
            const uniqueQuestionsSeen = Object.keys(questionHistory).length;
            const coveragePercent = questions.length > 0 ? Math.round((uniqueQuestionsSeen / questions.length) * 100) : 0;
            
            let totalSeenAttempts = 0;
            let totalSeenCorrect = 0;
            Object.values(questionHistory).forEach(stats => {
                totalSeenAttempts += stats.attempts;
                totalSeenCorrect += stats.correct;
            });
            const overallAccuracy = totalSeenAttempts > 0 ? (totalSeenCorrect / totalSeenAttempts) * 100 : 0;
            const preparednessScore = Math.min(100, Math.round((coveragePercent / 100) * overallAccuracy)) || 0;

            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                {/* Hero Section - Dynamically Shifts Theme Based on Active Bank */}
                <div className={`p-8 sm:p-12 rounded-3xl shadow-md border border-slate-300 dark:border-slate-700/50 mb-8 flex flex-col sm:flex-row items-center sm:items-start gap-6 sm:gap-10 text-center sm:text-left transition-all ${activeBankMode === 'exam' ? 'bg-purple-50 dark:bg-purple-900/10' : 'bg-white dark:bg-slate-800'}`}>
                  <div className={`w-20 h-20 sm:w-28 sm:h-28 rounded-full flex items-center justify-center shrink-0 ${activeBankMode === 'exam' ? 'bg-purple-200 dark:bg-purple-900/50 text-purple-700 dark:text-purple-400' : 'bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400'}`}>
                    {activeBankMode === 'exam' ? <Trophy size={44} className="sm:w-14 sm:h-14" strokeWidth={1.5} /> : <BookOpen size={44} className="sm:w-14 sm:h-14" strokeWidth={1.5} />}
                  </div>
                  <div className="flex-1">
                    <h1 className="text-3xl sm:text-4xl font-bold text-slate-800 dark:text-slate-50 mb-3 tracking-tight">
                      {activeBankMode === 'exam' ? 'Real Past Exam Papers' : 'Life in the UK: Exam Prep'}
                    </h1>
                    <div className="flex items-center justify-center sm:justify-start gap-2 mb-4">
                        <Brain size={18} className={activeBankMode === 'exam' ? 'text-purple-600 dark:text-purple-400' : 'text-indigo-600 dark:text-indigo-400'} />
                        <span className={`text-xs sm:text-sm font-bold uppercase tracking-widest ${activeBankMode === 'exam' ? 'text-purple-700 dark:text-purple-400' : 'text-indigo-700 dark:text-indigo-400'}`}>
                          {activeBankMode === 'exam' ? 'Practice actual exam conditions' : 'Master dynamic training system'}
                        </span>
                    </div>
                    <p className="text-slate-600 dark:text-slate-300 text-base sm:text-lg leading-relaxed max-w-2xl">
                      {activeBankMode === 'exam' 
                        ? 'Test your readiness against actual questions that appeared in past exams. Perfect your final preparations.'
                        : 'Master the official syllabus details with smart spacing, persistent weak-area tracking, and customizable auto-navigation.'
                      }
                    </p>
                  </div>
                </div>

                <h2 className="text-xl font-bold text-slate-800 dark:text-slate-50 mb-6 flex items-center gap-2 px-2">
                  <Activity size={20} className="text-blue-500" />
                  Training Modes {activeBankMode === 'exam' && <span className="text-sm font-medium text-slate-500 dark:text-slate-400 ml-1">(Exams)</span>}
                </h2>

                {/* Actions Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  {activeQuestions.length > 0 && currentIndex < activeQuestions.length && currentScreen !== 'results' && (
                    <button 
                      onClick={() => setCurrentScreen('quiz')}
                      className="lg:col-span-4 bg-orange-500 hover:bg-orange-600 text-white font-medium py-4 px-6 rounded-full flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98] text-base"
                    >
                      <Play size={20} />
                      Resume Interrupted Test
                    </button>
                  )}

                  <button 
                    onClick={() => generateQuiz(false, false)}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-4 px-5 rounded-full flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98] text-base"
                  >
                    <Play size={20} />
                    Standard Test ({Math.min(mockTestSize, questions.length)} Qs)
                  </button>

                  <button 
                    onClick={() => generateQuiz(false, true)}
                    className="bg-purple-100 hover:bg-purple-200 dark:bg-purple-900/40 dark:hover:bg-purple-900/60 text-purple-900 dark:text-purple-100 border border-purple-300 dark:border-purple-800 font-medium py-4 px-5 rounded-full flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base"
                  >
                    <Activity size={20} />
                    Marathon Mode
                  </button>

                  <button 
                    onClick={handleStudyModeClick}
                    className="bg-emerald-100 hover:bg-emerald-200 dark:bg-emerald-900/40 dark:hover:bg-emerald-900/60 text-emerald-900 dark:text-emerald-100 border border-emerald-300 dark:border-emerald-800 font-medium py-4 px-5 rounded-full flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base"
                  >
                    <GraduationCap size={20} />
                    Study & Review
                  </button>
                  
                  <button 
                    onClick={() => setCurrentScreen('analysis')}
                    className="bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700/80 text-slate-800 dark:text-slate-200 font-medium py-4 px-5 rounded-full flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base shadow-sm border border-slate-300 dark:border-slate-600"
                  >
                    <BarChart3 size={20} />
                    View Stats
                  </button>
                </div>

                {/* Home Stats Footer */}
                {quizHistory.length > 0 && (
                  <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 sm:p-10 border border-slate-300 dark:border-slate-700 shadow-md flex flex-col sm:flex-row flex-wrap items-center justify-around gap-6 sm:gap-8">
                    <div className="text-center">
                      <p className="text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Preparedness</p>
                      <p className="text-4xl font-bold text-indigo-600 dark:text-indigo-400">{preparednessScore}%</p>
                    </div>
                    <div className="hidden sm:block w-px h-16 bg-slate-200 dark:bg-slate-700"></div>
                    <div className="text-center">
                      <p className="text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Tests Taken</p>
                      <p className="text-4xl font-bold text-slate-800 dark:text-slate-50">{quizHistory.length}</p>
                    </div>
                    <div className="hidden sm:block w-px h-16 bg-slate-200 dark:bg-slate-700"></div>
                    <div className="text-center">
                      <p className="text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Avg Score</p>
                      <p className="text-4xl font-bold text-slate-800 dark:text-slate-50">
                        {Math.round(quizHistory.reduce((sum, entry) => sum + getScoreValue(entry), 0) / quizHistory.length)}<span className="text-2xl text-slate-500 dark:text-slate-400 font-medium">/{Math.round(quizHistory.reduce((sum, entry) => sum + getTotalValue(entry), 0) / quizHistory.length)}</span>
                      </p>
                    </div>
                  </div>
                )}
                
                <div className="mt-8 text-center pb-4">
                  <p className="text-slate-500 dark:text-slate-400 text-sm font-medium">Version {APP_VERSION}</p>
                </div>
              </div>
            );
          };

          const renderQuiz = () => {
            const question = activeQuestions[currentIndex];
            const hasAnswered = userAnswers[currentIndex] !== undefined;
            const isCorrect = userAnswers[currentIndex] === question?.correctAnswer;
            const progress = ((currentIndex) / activeQuestions.length) * 100;

            if (!question) return null;

            return (
              <div className="max-w-3xl mx-auto py-6 px-4 sm:px-6">
                <div className="mb-6">
                  <div className="flex flex-wrap justify-between items-center text-sm font-medium text-slate-600 dark:text-slate-400 mb-3 gap-y-2 gap-x-3">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="uppercase tracking-wider font-bold">Question {currentIndex + 1} of {activeQuestions.length}</span>
                      <span className="px-3 py-1 text-xs font-bold bg-slate-200 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-full">{question.category}</span>
                    </div>
                    
                    <div className="flex items-center gap-1.5 bg-blue-100 dark:bg-blue-900/40 px-3.5 py-1.5 rounded-full text-blue-800 dark:text-blue-200 font-mono text-sm ml-auto border border-blue-200 dark:border-blue-800">
                      <Clock size={16} className="animate-pulse" />
                      <span>{formatTime(elapsedTime)}</span>
                    </div>
                  </div>
                  <div className="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div 
                      className="bg-blue-600 dark:bg-blue-500 h-full rounded-full transition-all duration-500 ease-out"
                      style={{ width: `${progress}%` }}
                    ></div>
                  </div>
                </div>

                <div key={question.id} className="animate-in slide-in-from-right-8 duration-300">
                  <h2 className="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-50 mb-8 leading-snug tracking-tight">{question.text}</h2>
                  
                  <div className="space-y-3">
                    {question.options.map((option, idx) => {
                      let btnClass = "w-full text-left p-4 sm:p-5 rounded-3xl border-2 text-base sm:text-lg font-medium leading-snug transition-all ";
                      
                      if (!hasAnswered) {
                        btnClass += "bg-white dark:bg-slate-800 shadow-sm hover:bg-blue-50 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 border-slate-300 dark:border-slate-600 hover:border-blue-400";
                      } else {
                        if (option === question.correctAnswer) {
                          btnClass += "bg-green-100 dark:bg-green-900/40 border-green-500 dark:border-green-500/60 text-green-900 dark:text-green-100 shadow-sm";
                        } else if (option === userAnswers[currentIndex]) {
                          btnClass += "bg-red-100 dark:bg-red-900/40 border-red-500 dark:border-red-500/60 text-red-900 dark:text-red-100 shadow-sm";
                        } else {
                          btnClass += "bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-500 opacity-70 border-slate-200 dark:border-slate-700 cursor-not-allowed";
                        }
                      }

                      return (
                        <button
                          key={`${question.id}-${idx}`}
                          onClick={() => handleAnswer(option)}
                          disabled={hasAnswered}
                          className={btnClass}
                        >
                          <div className="flex items-center justify-between gap-3">
                            <span>{option}</span>
                            {hasAnswered && option === question.correctAnswer && <CheckCircle2 className="text-green-600 dark:text-green-400 shrink-0" size={24}/>}
                            {hasAnswered && option === userAnswers[currentIndex] && option !== question.correctAnswer && <XCircle className="text-red-600 dark:text-red-400 shrink-0" size={24}/>}
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  {/* NAVIGATION FOOTER (Moved below options) */}
                  <div className="mt-8 flex flex-wrap items-center justify-between gap-4">
                    <button 
                      onClick={() => {
                        setIsAutoNavCancelled(true);
                        setCurrentIndex(currentIndex - 1);
                      }}
                      disabled={currentIndex === 0}
                      className={`flex items-center gap-1.5 px-5 py-3 rounded-full font-medium transition-all text-sm sm:text-base ${currentIndex === 0 ? 'bg-transparent text-slate-400 dark:text-slate-600 cursor-not-allowed' : 'bg-white border border-slate-300 hover:bg-slate-100 text-slate-800 dark:bg-slate-800 dark:border-slate-600 dark:hover:bg-slate-700 dark:text-slate-200 shadow-sm active:scale-95'}`}
                    >
                      <ChevronLeft size={20} />
                      <span>Prev</span>
                    </button>

                    <div className="flex items-center gap-2 sm:gap-3">
                       {hasAnswered && isCorrect && autoNavigate && !isAutoNavCancelled && (
                         <button 
                           onClick={() => setIsAutoNavCancelled(true)}
                           className="flex items-center gap-1 sm:gap-1.5 px-3 sm:px-4 py-3 rounded-full font-medium text-slate-600 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-colors text-sm"
                         >
                           <X size={18} className="shrink-0" /> 
                           <span className="hidden sm:inline">Cancel Auto</span>
                           <span className="sm:hidden">Cancel</span>
                         </button>
                       )}

                       {currentIndex < activeQuestions.length - 1 ? (
                        <button 
                          onClick={() => {
                            setIsAutoNavCancelled(true);
                            nextQuestion();
                          }}
                          disabled={!hasAnswered}
                          className={`group relative overflow-hidden flex items-center gap-2 px-8 py-3.5 rounded-full font-medium transition-all text-base ${!hasAnswered ? 'bg-slate-200 text-slate-400 dark:bg-slate-800 dark:text-slate-600 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-md active:scale-95'}`}
                        >
                          {/* Auto Timer Progress Border - Radial Wipe Thick Border */}
                          {hasAnswered && isCorrect && autoNavigate && !isAutoNavCancelled && (
                            <>
                              <div 
                                className="absolute inset-0 pointer-events-none transition-all duration-75"
                                style={{ 
                                  background: `conic-gradient(rgba(255,255,255,0.9) ${autoNavProgress}%, transparent 0)`
                                }}
                              ></div>
                              <div className="absolute inset-[4px] rounded-full bg-blue-600 group-hover:bg-blue-700 pointer-events-none transition-colors"></div>
                            </>
                          )}
                          <span className="relative z-10 flex items-center gap-1">
                            Next
                          </span>
                          <ChevronRight size={20} className="relative z-10" />
                        </button>
                      ) : (
                        <button 
                          onClick={() => {
                            setIsAutoNavCancelled(true);
                            finishQuiz();
                          }}
                          disabled={!hasAnswered}
                          className={`flex items-center gap-2 px-8 py-3.5 rounded-full font-medium transition-all text-base ${!hasAnswered ? 'bg-slate-200 text-slate-400 dark:bg-slate-800 dark:text-slate-600 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md active:scale-95'}`}
                        >
                          Finish
                          <CheckCircle2 size={20} />
                        </button>
                      )}
                    </div>
                  </div>

                  {/* INLINE EXPLANATION & MEMORY TIPS (Moved below navigation) */}
                  {hasAnswered && (
                    <div className={`mt-8 p-6 sm:p-8 rounded-3xl border-2 ${isCorrect ? 'bg-green-50 border-green-200 dark:bg-green-900/10 dark:border-green-900/30' : 'bg-orange-50 border-orange-200 dark:bg-orange-900/10 dark:border-orange-900/30'} animate-in slide-in-from-top-4 duration-300`}>
                      <div className="flex items-center gap-3 mb-4">
                        <div className={`shrink-0 p-2 rounded-full ${isCorrect ? 'bg-green-200 text-green-800 dark:bg-green-800 dark:text-green-200' : 'bg-orange-200 text-orange-800 dark:bg-orange-800 dark:text-orange-200'}`}>
                          {isCorrect ? <CheckCircle2 size={24} /> : <AlertTriangle size={24} />}
                        </div>
                        <h3 className={`text-xl font-bold ${isCorrect ? 'text-green-800 dark:text-green-400' : 'text-orange-800 dark:text-orange-400'}`}>
                          {isCorrect ? 'Correct!' : 'Incorrect'}
                        </h3>
                      </div>
                      
                      <p className={`text-lg leading-relaxed ${isCorrect ? 'text-green-950 dark:text-green-100' : 'text-orange-950 dark:text-orange-100'}`}>
                        {question.explanation}
                      </p>

                      {!isCorrect && question.tip && (
                        <div className="mt-5 pt-5 border-t border-orange-300/50 dark:border-orange-800/50">
                          <div className="flex items-center gap-2 mb-2">
                            <Brain className="text-indigo-600 dark:text-indigo-400" size={18} />
                            <h5 className="text-sm font-bold uppercase tracking-wider text-indigo-700 dark:text-indigo-400">Memory Trick</h5>
                          </div>
                          <p className="text-lg leading-relaxed font-medium text-slate-800 dark:text-slate-200">
                            "{question.tip}"
                          </p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          };

          const renderStudy = () => {
            const question = questions[studyIndex];
            if (!question) return null;
            const progress = ((studyIndex + 1) / questions.length) * 100;

            return (
              <div className="max-w-3xl mx-auto py-6 px-4 sm:px-6">
                <div className="mb-6">
                  <div className="flex flex-wrap justify-between items-center text-sm font-medium text-slate-600 dark:text-slate-400 mb-3 gap-y-2 gap-x-3">
                    <div className="flex items-center gap-2 flex-wrap">
                      <GraduationCap className="text-emerald-600 dark:text-emerald-500 shrink-0" size={20} />
                      <span className="uppercase tracking-wider font-bold">Study — Q{studyIndex + 1} of {questions.length}</span>
                      <span className="px-3 py-1 text-xs font-bold bg-slate-200 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-full">{question.category}</span>
                    </div>
                  </div>
                  <div className="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div 
                      className="bg-emerald-500 h-full rounded-full transition-all duration-300 ease-out"
                      style={{ width: `${progress}%` }}
                    />
                  </div>
                </div>

                <div className="animate-in slide-in-from-right-8 duration-300">
                  <div className="flex items-start justify-between gap-4 mb-6">
                    <h2 className="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-50 leading-snug tracking-tight">{question.text}</h2>
                    <button 
                      onClick={() => setHideIncorrectStudy(!hideIncorrectStudy)}
                      className="shrink-0 flex items-center justify-center p-2.5 rounded-full bg-white border border-slate-300 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 shadow-sm transition-colors mt-1"
                      title={hideIncorrectStudy ? "Show all options" : "Hide incorrect options"}
                    >
                      {hideIncorrectStudy ? <Eye size={18} /> : <EyeOff size={18} />}
                    </button>
                  </div>
                  
                  <div className="space-y-3 mb-8">
                    {studyOptions.map((option, idx) => {
                      const isCorrectAnswer = option === question.correctAnswer;
                      if (hideIncorrectStudy && !isCorrectAnswer) return null;

                      let btnClass = "w-full text-left p-4 sm:p-5 rounded-3xl border-2 text-base sm:text-lg font-medium leading-snug ";
                      
                      if (isCorrectAnswer) {
                        btnClass += "bg-green-100 border-green-500 text-green-900 dark:bg-green-900/40 dark:border-green-500/50 dark:text-green-100 shadow-sm";
                      } else {
                        btnClass += "bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 opacity-70 border-slate-200 dark:border-slate-700";
                      }

                      return (
                        <div key={idx} className={btnClass}>
                          <div className="flex items-center justify-between gap-3">
                            <span>{option}</span>
                            {isCorrectAnswer && <CheckCircle2 className="text-green-600 dark:text-green-400 shrink-0" size={24}/>}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Fact & Mnemonic Details Container */}
                  <div className="flex flex-col gap-4 mb-8">
                    <div className="p-5 sm:p-6 rounded-3xl bg-emerald-50 dark:bg-emerald-900/10 border-2 border-emerald-200 dark:border-emerald-800/30">
                      <div className="flex gap-4">
                        <div className="shrink-0 p-2 rounded-full h-fit bg-emerald-200 dark:bg-emerald-800 text-emerald-800 dark:text-emerald-200">
                          <Info size={24} />
                        </div>
                        <div>
                          <h4 className="text-lg font-bold mb-1 text-emerald-900 dark:text-emerald-400">
                            Explanation & Fact
                          </h4>
                          <p className="text-base sm:text-lg text-emerald-950 dark:text-emerald-100 leading-relaxed">
                            {question.explanation}
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* Integrated Memory Trick Display */}
                    {question.tip && (
                      <div className="p-5 sm:p-6 rounded-3xl bg-indigo-50 dark:bg-indigo-900/10 border-2 border-indigo-200 dark:border-indigo-800/30 animate-in fade-in duration-300">
                        <div className="flex gap-4">
                          <div className="shrink-0 p-2 rounded-full h-fit bg-indigo-200 dark:bg-indigo-800 text-indigo-800 dark:text-indigo-200">
                            <Brain size={24} />
                          </div>
                          <div>
                            <h4 className="text-lg font-bold mb-1 text-indigo-900 dark:text-indigo-400">
                              Memory Trick
                            </h4>
                            <p className="text-base sm:text-lg text-indigo-950 dark:text-indigo-100 leading-relaxed font-medium italic">
                              "{question.tip}"
                            </p>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="flex items-center justify-between gap-4">
                    <button 
                      onClick={() => studyIndex > 0 && setStudyIndex(studyIndex - 1)}
                      disabled={studyIndex === 0}
                      className={`flex items-center gap-1.5 px-5 py-3 rounded-full font-medium transition-all text-base ${studyIndex === 0 ? 'bg-transparent text-slate-400 dark:text-slate-600 cursor-not-allowed' : 'bg-white border border-slate-300 hover:bg-slate-100 text-slate-800 dark:bg-slate-800 dark:border-slate-600 dark:hover:bg-slate-700 dark:text-slate-200 shadow-sm active:scale-95'}`}
                    >
                      <ChevronLeft size={20} />
                      Prev
                    </button>

                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="bg-transparent hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium py-3 px-6 rounded-full transition-all text-base"
                    >
                      Exit Study
                    </button>

                    <button 
                      onClick={() => {
                        if (studyIndex < questions.length - 1) {
                          setStudyIndex(studyIndex + 1);
                        } else {
                          setCurrentScreen('home');
                        }
                      }}
                      className="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-8 py-3 rounded-full transition-all shadow-md active:scale-95 text-base"
                    >
                      {studyIndex === questions.length - 1 ? 'Finish' : 'Next'}
                      <ChevronRight size={20} />
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderResults = () => {
            const score = calculateScore();
            const totalQs = activeQuestions.length;
            const passTarget = Math.ceil(totalQs * 0.75);
            const isPass = score >= passTarget; 
            const weakCount = getWeakQuestionsCount();

            return (
              <div className="max-w-3xl mx-auto py-8 px-4 sm:px-6 animate-in zoom-in duration-300">
                <div className="bg-white dark:bg-slate-800 p-8 sm:p-12 rounded-3xl shadow-md text-center border border-slate-300 dark:border-slate-700">
                  <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 ${isPass ? 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400' : 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400'}`}>
                    <Trophy size={48} />
                  </div>
                  
                  <h2 className="text-3xl font-bold text-slate-900 dark:text-slate-50 mb-2 tracking-tight">
                    {isPass ? 'Congratulations! You Passed' : 'Keep Studying! You Failed'}
                  </h2>
                  <p className="text-base text-slate-600 dark:text-slate-400 mb-8 font-medium">You need {passTarget} out of {totalQs} (75%) to pass.</p>
                  
                  <div className="flex flex-col items-center justify-center gap-2 mb-10">
                    <div className="text-7xl font-bold text-slate-900 dark:text-slate-50 tracking-tighter">
                      {score}<span className="text-4xl text-slate-500 dark:text-slate-400 font-medium">/{totalQs}</span>
                    </div>
                    <div className="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-300 text-sm font-medium px-4 py-2 rounded-full mt-3 border border-slate-300 dark:border-slate-700">
                      <Clock size={16} className="text-blue-600" />
                      <span>Time Taken: {formatTimeReadable(finalTestTime)}</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button 
                      onClick={() => setCurrentScreen('analysis')}
                      className="bg-indigo-100 hover:bg-indigo-200 dark:bg-indigo-900/40 dark:hover:bg-indigo-900/60 border border-indigo-300 text-indigo-900 dark:text-indigo-100 font-medium py-3.5 px-6 rounded-full flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base"
                    >
                      <BarChart3 size={20} />
                      View Stats
                    </button>
                    <button 
                      onClick={() => generateQuiz(false)}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-6 rounded-full flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98] text-base"
                    >
                      <RefreshCcw size={20} />
                      Take a New Test
                    </button>
                    <button 
                      onClick={() => weakCount > 0 ? generateQuiz(true) : null}
                      disabled={weakCount === 0}
                      className={`font-medium py-3.5 px-6 rounded-full flex items-center justify-center gap-2 transition-all text-base ${weakCount > 0 ? 'bg-orange-500 hover:bg-orange-600 text-white shadow-md active:scale-[0.98]' : 'bg-slate-100 border border-slate-300 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed'}`}
                    >
                      <Target size={20} />
                      Practise Weak Areas {weakCount > 0 ? `(${weakCount})` : ''}
                    </button>
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="bg-white border border-slate-300 hover:bg-slate-100 dark:bg-slate-800 dark:border-slate-700 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 font-medium py-3.5 px-6 rounded-full flex items-center justify-center gap-2 transition-all shadow-sm text-base"
                    >
                      <Home size={20} />
                      Return Home
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderAnalysis = () => {
            const stats = getCategoryStats();
            const categories = questions.length > 0 ? [...new Set(questions.map(q => q.category))] : [];
            const weakCount = getWeakQuestionsCount();
            
            const totalTests = quizHistory.length;
            const passedTests = quizHistory.filter(s => getScoreValue(s) >= Math.ceil(getTotalValue(s) * 0.75)).length;
            const passRate = totalTests > 0 ? Math.round((passedTests / totalTests) * 100) : 0;
            
            const uniqueQuestionsSeen = Object.keys(questionHistory).length;
            const coveragePercent = questions.length > 0 ? Math.round((uniqueQuestionsSeen / questions.length) * 100) : 0;
            
            const totalTimeTakenSecs = quizHistory.reduce((sum, entry) => sum + (entry.timeTaken || 0), 0);
            const estTimeMins = totalTimeTakenSecs > 0 ? Math.round(totalTimeTakenSecs / 60) : Math.round((Object.values(questionHistory).reduce((sum, q) => sum + q.attempts, 0) * 15) / 60);
            
            let totalSeenAttempts = 0;
            let totalSeenCorrect = 0;
            Object.values(questionHistory).forEach(stats => {
                totalSeenAttempts += stats.attempts;
                totalSeenCorrect += stats.correct;
            });
            const overallAccuracy = totalSeenAttempts > 0 ? (totalSeenCorrect / totalSeenAttempts) * 100 : 0;
            
            const preparednessScore = Math.min(100, Math.round((coveragePercent / 100) * overallAccuracy)) || 0;

            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                
                {/* Header */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-8">
                  <div className="flex items-center gap-4">
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="p-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-full shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors"
                    >
                      <Home size={22} />
                    </button>
                    <div>
                      <h2 className="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-50 tracking-tight">Performance Analytics</h2>
                      <div className="flex items-center gap-2 mt-1">
                        <p className="text-sm text-slate-600 dark:text-slate-400 font-medium">Based on {totalTests} mock tests taken</p>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                    <button 
                      onClick={() => generateQuiz(false)}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-full flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98] text-sm sm:text-base w-full sm:w-auto"
                    >
                      <RefreshCcw size={18} />
                      New Mock Test
                    </button>
                    {weakCount > 0 && (
                      <button 
                        onClick={() => generateQuiz(true)}
                        className="bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 px-6 rounded-full flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98] text-sm sm:text-base w-full sm:w-auto"
                      >
                        <Target size={18} />
                        Practise Weak Areas ({weakCount})
                      </button>
                    )}
                  </div>
                </div>

                {/* Motivational Banner when 0 tests taken */}
                {totalTests === 0 && (
                  <div className="bg-blue-50 dark:bg-blue-900/20 border-2 border-blue-200 dark:border-blue-800 rounded-3xl p-6 sm:p-8 mb-8 flex flex-col sm:flex-row items-center gap-5 text-center sm:text-left shadow-sm">
                    <div className="w-14 h-14 bg-blue-200 dark:bg-blue-800/50 text-blue-800 dark:text-blue-300 rounded-full flex items-center justify-center shrink-0">
                      <Trophy size={28} />
                    </div>
                    <div className="flex-1">
                      <h3 className="text-xl font-bold text-blue-900 dark:text-blue-200 mb-1.5">Ready to track your progress?</h3>
                      <p className="text-base text-blue-800 dark:text-blue-300">You haven't taken any mock tests yet. Your dashboard is currently empty. Take your first test to build your stats and improve your preparedness score!</p>
                    </div>
                  </div>
                )}

                {/* Top Metrics Grid */}
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  
                  {/* Preparedness Score */}
                  <div className="bg-indigo-600 rounded-3xl p-6 text-white shadow-md relative overflow-hidden">
                    <div className="relative z-10">
                      <div className="flex justify-between items-start mb-2">
                        <p className="text-indigo-200 text-xs sm:text-sm font-bold uppercase tracking-wider">Preparedness</p>
                        <Brain size={20} className="text-indigo-300" />
                      </div>
                      <div className="flex items-end gap-2">
                        <span className="text-4xl font-bold">{preparednessScore}%</span>
                      </div>
                      <p className="text-xs text-indigo-200 mt-2 font-medium">Based on {coveragePercent}% coverage & {Math.round(overallAccuracy)}% accuracy</p>
                    </div>
                    <Activity size={120} className="absolute -right-6 -bottom-6 text-indigo-500 opacity-40" strokeWidth={1} />
                  </div>

                  {/* Pass Rate */}
                  <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-md flex flex-col justify-between border border-slate-300 dark:border-slate-700">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-600 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Pass Rate</p>
                      <div className={`p-2 rounded-full ${passRate >= 75 ? 'bg-green-100 text-green-700 dark:bg-green-900/40' : 'bg-red-100 text-red-700 dark:bg-red-900/40'}`}>
                        <Trophy size={18} />
                      </div>
                    </div>
                    <div>
                      <span className={`text-4xl font-bold ${passRate >= 75 ? 'text-green-600 dark:text-green-400' : 'text-slate-800 dark:text-slate-50'}`}>{passRate}%</span>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mt-1 font-medium">{passedTests} passed out of {totalTests}</p>
                    </div>
                  </div>

                  {/* Bank Coverage */}
                  <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-md flex flex-col justify-between border border-slate-300 dark:border-slate-700">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-600 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Qs Coverage</p>
                      <div className="p-2 rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">
                        <PieChart size={18} />
                      </div>
                    </div>
                    <div>
                      <span className="text-4xl font-bold text-slate-800 dark:text-slate-50">{coveragePercent}%</span>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mt-1 font-medium">{uniqueQuestionsSeen} of {questions.length} unique questions</p>
                    </div>
                  </div>

                  {/* Est Time Spent */}
                  <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-md flex flex-col justify-between border border-slate-300 dark:border-slate-700">
                    <div className="flex justify-between items-start mb-2">
                      <p className="text-slate-600 dark:text-slate-400 text-xs sm:text-sm font-bold uppercase tracking-wider">Practicing</p>
                      <div className="p-2 rounded-full bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300">
                        <Clock size={18} />
                      </div>
                    </div>
                    <div>
                      <div className="flex items-baseline gap-1.5">
                        <span className="text-4xl font-bold text-slate-800 dark:text-slate-50">{estTimeMins}</span>
                        <span className="text-base font-bold text-slate-600 dark:text-slate-400 mb-1">mins</span>
                      </div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mt-1 font-medium">Across training sessions</p>
                    </div>
                  </div>
                </div>

                {/* Detailed Category Analysis */}
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-md border border-slate-300 dark:border-slate-700 p-6 sm:p-10 mb-8">
                  <h3 className="text-xl font-bold text-slate-900 dark:text-slate-50 mb-8 flex items-center gap-2">
                    <BookOpen size={22} className="text-blue-600 dark:text-blue-400" />
                    Syllabus Breakdown
                  </h3>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {categories.map(cat => {
                      const catStats = stats[cat] || { total: 0, correct: 0, incorrect: 0, unseen: 0 };
                      const { total, correct, incorrect, unseen } = catStats;
                      
                      const correctPct = total > 0 ? (correct / total) * 100 : 0;
                      const incorrectPct = total > 0 ? (incorrect / total) * 100 : 0;
                      
                      const coveragePct = total > 0 ? Math.round(((correct + incorrect) / total) * 100) : 0;
                      const isComplete = coveragePct === 100;

                      return (
                        <div key={cat} className="p-6 rounded-3xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 transition-colors flex flex-col items-center text-center gap-4 hover:border-slate-300 dark:hover:border-slate-600 shadow-sm">
                          
                          <div className="flex items-center justify-center gap-2 flex-wrap w-full">
                            <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100">{cat}</h3>
                            {incorrect > 0 && <AlertTriangle size={18} className="text-orange-500 dark:text-orange-400 shrink-0" />}
                            {isComplete && incorrect === 0 && <CheckCircle2 size={18} className="text-green-500 dark:text-green-400 shrink-0" />}
                          </div>

                          {/* BIG Donut Chart */}
                          <div 
                            className="w-32 h-32 sm:w-40 sm:h-40 rounded-full relative flex items-center justify-center shadow-sm my-2 shrink-0 border border-slate-100 dark:border-slate-700"
                            style={{
                              background: `conic-gradient(#22c55e 0% ${correctPct}%, #f97316 ${correctPct}% ${correctPct + incorrectPct}%, ${isDarkMode ? '#334155' : '#e2e8f0'} ${correctPct + incorrectPct}% 100%)`
                            }}
                          >
                            <div className="w-20 h-20 sm:w-28 sm:h-28 bg-white dark:bg-slate-800 rounded-full absolute shadow-inner flex flex-col items-center justify-center border border-slate-100 dark:border-slate-700">
                               <span className="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-100">{coveragePct}%</span>
                               <span className="text-[10px] sm:text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mt-0.5">Covered</span>
                            </div>
                          </div>

                          {/* Legend / Stats block */}
                          <div className="flex flex-col items-center gap-2 text-xs sm:text-sm w-full mt-2">
                            <div className="flex items-center justify-center gap-1.5 text-slate-700 dark:text-slate-300 font-bold bg-slate-100 dark:bg-slate-900 px-4 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 w-full max-w-[180px]">
                                <span className="w-2.5 h-2.5 rounded-full bg-slate-400 dark:bg-slate-500 shrink-0"></span>
                                {total} Total Qs
                            </div>
                            <div className="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 mt-2">
                                <div className="flex items-center gap-1.5 text-green-700 dark:text-green-400 font-medium">
                                    <span className="w-2.5 h-2.5 rounded-full bg-green-500 shrink-0"></span>
                                    {correct} Mastered
                                </div>
                                <div className="flex items-center gap-1.5 text-orange-700 dark:text-orange-400 font-medium">
                                    <span className="w-2.5 h-2.5 rounded-full bg-orange-500 shrink-0"></span>
                                    {incorrect} Weak
                                </div>
                                <div className="flex items-center gap-1.5 text-slate-600 dark:text-slate-400 font-medium">
                                    <span className="w-2.5 h-2.5 rounded-full bg-slate-300 dark:bg-slate-600 border border-slate-400 dark:border-slate-500 shrink-0"></span>
                                    {unseen} Unseen
                                </div>
                            </div>
                          </div>

                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          };

          const renderSettings = () => {
            return (
              <div className="max-w-5xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate-in fade-in duration-300">
                {/* Header */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                  <div className="flex items-center gap-4">
                    <button 
                      onClick={() => setCurrentScreen('home')}
                      className="p-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-full shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors"
                    >
                      <Home size={22} />
                    </button>
                    <div>
                      <h2 className="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-50 tracking-tight">App Settings</h2>
                      <p className="text-sm text-slate-600 dark:text-slate-400 font-medium mt-1">Configure your training experience</p>
                    </div>
                  </div>
                  <div className="bg-slate-200 dark:bg-slate-800 text-slate-800 dark:text-slate-300 border border-slate-300 dark:border-slate-700 px-4 py-2 rounded-full text-sm font-bold self-start sm:self-auto shadow-sm">
                    Version {APP_VERSION}
                  </div>
                </div>

                {/* Main Settings Form */}
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-md border border-slate-300 dark:border-slate-700 p-6 sm:p-10 space-y-8">
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                      {/* Column 1 */}
                      <div className="space-y-8">
                          {/* Active Bank Mode Configuration (Only if exam questions loaded) */}
                          {hasExamBank && (
                            <div className="space-y-3">
                               <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                                <div className="p-2 bg-purple-100 dark:bg-purple-900/50 border border-purple-200 dark:border-purple-800 text-purple-700 dark:text-purple-400 rounded-full">
                                  <Brain size={18} />
                                </div>
                                Active Question Bank
                              </label>
                              <div className="flex bg-slate-100 dark:bg-slate-900 rounded-2xl p-1.5 border border-slate-300 dark:border-slate-700 shadow-inner">
                                <button 
                                  onClick={() => setActiveBankMode('standard')}
                                  className={`flex-1 flex items-center justify-center gap-2 py-3.5 text-sm font-bold rounded-xl transition-all ${activeBankMode === 'standard' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-700 dark:text-blue-400 border border-slate-300 dark:border-slate-600' : 'text-slate-600 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 border border-transparent'}`}
                                >
                                  <BookOpen size={18} />
                                  Standard
                                </button>
                                <button 
                                  onClick={() => setActiveBankMode('exam')}
                                  className={`flex-1 flex items-center justify-center gap-2 py-3.5 text-sm font-bold rounded-xl transition-all ${activeBankMode === 'exam' ? 'bg-white dark:bg-slate-800 shadow-sm text-purple-700 dark:text-purple-400 border border-slate-300 dark:border-slate-600' : 'text-slate-600 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 border border-transparent'}`}
                                >
                                  <Trophy size={18} />
                                  Exams
                                </button>
                              </div>
                            </div>
                          )}

                          {/* Mock Test Size Configuration */}
                          <div className="space-y-3">
                            <label className="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-3">
                              <div className="p-2 bg-blue-100 dark:bg-blue-900/50 border border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-400 rounded-full">
                                <Target size={18} />
                              </div>
                              Mock Test Size
                            </label>
                            <select
